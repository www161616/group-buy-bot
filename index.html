<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>開團助手 — 包子媽生鮮小舖</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#f5f3ee;--surface:#fff;--border:#ddd9d0;--text:#2a2520;--text-muted:#7a7060;--accent:#c0392b;--accent-light:#fdf0ef;--green:#27ae60;--green-light:#edf7f1;--yellow:#e67e22;--yellow-light:#fef6ec;--blue:#2980b9;--tag-bg:#eceae4;--mono:'JetBrains Mono',monospace;--sans:'Noto Sans TC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
header{background:var(--text);color:white;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700}.logo span{color:#f0a500}
.header-status{font-size:12px;color:#aaa;font-family:var(--mono)}
.container{max-width:1500px;margin:0 auto;padding:24px 20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-green{background:var(--green);color:white}.btn-green:hover{background:#219a52}
.btn-yellow{background:var(--yellow);color:white}.btn-yellow:hover{background:#cf6d17}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--tag-bg)}
.btn-accent{background:var(--accent);color:white}.btn-accent:hover{background:#a93226}
.btn-blue{background:var(--blue);color:white}.btn-blue:hover{background:#2175a8}
.btn:disabled{opacity:.5;cursor:not-allowed}
.emoji-bar{display:none;flex-wrap:wrap;gap:2px;margin-bottom:6px}
.emoji-bar.show{display:flex}
.emoji-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 5px;font-size:16px;cursor:pointer;line-height:1.2}
.emoji-btn:hover{background:var(--tag-bg)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:var(--green-light);color:var(--green)}.badge-yellow{background:var(--yellow-light);color:var(--yellow)}
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 16px;flex:1;min-width:80px;text-align:center}
.stat-num{font-size:24px;font-weight:700;font-family:var(--mono);line-height:1.2}
.stat-num.green{color:var(--green)}.stat-num.yellow{color:var(--yellow)}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);transition:all .15s}
.tab.active{background:var(--text);color:white;border-color:var(--text)}
.result-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.result-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer}
.result-time{font-family:var(--mono);font-size:12px;color:var(--text-muted);min-width:90px;flex-shrink:0}
.result-name{flex:1;font-weight:500;font-size:14px}
.result-toggle{font-size:12px;color:var(--text-muted);transition:transform .2s}
.result-item.open .result-toggle{transform:rotate(180deg)}
.result-body{display:none;border-top:1px solid var(--border);padding:16px}
.result-item.open .result-body{display:block}
.match-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;margin-bottom:14px}
.match-key{font-size:12px;color:var(--text-muted);white-space:nowrap}.match-val{font-size:13px;font-weight:500}
.styles-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
.styles-table th{text-align:left;padding:6px 10px;background:var(--tag-bg);font-size:11px;font-weight:700;color:var(--text-muted);border-bottom:1px solid var(--border)}
.styles-table td{padding:6px 10px;border-bottom:1px solid var(--border)}.styles-table tr:last-child td{border-bottom:none}
.copy-block{background:var(--tag-bg);border-radius:6px;padding:12px;margin-top:12px}
.copy-block pre{font-family:var(--mono);font-size:12px;white-space:pre-wrap;line-height:1.7;margin-top:6px}
.copy-btn-sm{padding:4px 10px;font-size:11px;border-radius:4px;background:white;border:1px solid var(--border);cursor:pointer;font-family:var(--sans);color:var(--text)}
.copy-btn-sm:hover{background:var(--border)}.copy-btn-sm.copied{color:var(--green);border-color:var(--green)}
.bot-block{background:#f0f7ff;border:1px solid #c8e0f8;border-radius:6px;padding:12px;margin-top:12px}
.bot-block-title{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--blue);margin-bottom:8px}
.new-marker{background:var(--yellow-light);border:1px solid #f0c080;border-radius:6px;padding:10px 14px;font-size:13px;color:var(--yellow);font-weight:500}
.product-img{max-width:120px;max-height:120px;border-radius:6px;border:1px solid var(--border);object-fit:cover;float:right;margin:0 0 8px 12px}
.match-lele-title{font-size:12px;color:var(--text-muted);background:var(--tag-bg);padding:4px 10px;border-radius:4px;margin-bottom:8px;font-family:var(--mono);word-break:break-all}
.section-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;margin-top:12px}
.date-input{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-family:var(--mono);font-size:13px;background:var(--surface);color:var(--text);width:150px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:10px;width:100%;max-width:600px;padding:24px;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.modal h3{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:4px;margin-top:12px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:13px;background:var(--surface);color:var(--text)}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--blue)}
.modal textarea{min-height:120px;resize:vertical;line-height:1.7}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.modal-styles-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
.modal-styles-table th{text-align:left;padding:6px 8px;background:var(--tag-bg);font-size:11px;font-weight:700;color:var(--text-muted)}
.modal-styles-table td{padding:4px 8px}
.modal-styles-table input{padding:6px 8px}
.modal-styles-table .del-style-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:16px;padding:2px 6px}
/* Batch list */
.batch-section{margin-top:32px;border-top:2px solid var(--border);padding-top:24px}
.batch-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.batch-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:13px}
.batch-table th{text-align:left;padding:10px 12px;background:var(--tag-bg);font-size:11px;font-weight:700;color:var(--text-muted);border-bottom:1px solid var(--border)}
.batch-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.batch-table tr:last-child td{border-bottom:none}
.batch-actions{display:flex;gap:8px;margin-top:16px}
.batch-empty{text-align:center;padding:30px;color:var(--text-muted);font-size:13px}
.new-tag{display:inline-block;background:var(--yellow-light);color:var(--yellow);font-size:11px;font-weight:700;padding:1px 6px;border-radius:3px}
/* 已加入批次標記 */
.result-item.in-batch>.result-header{background:#e8f5e9;border-left:4px solid var(--green)}
.result-item.in-batch>.result-header .result-name::after{content:'  \u2705 \u5df2\u52a0\u5165';font-size:11px;color:var(--green);font-weight:700;margin-left:8px}
/* 底部浮動批次 bar */
.batch-bar{position:fixed;bottom:0;left:0;right:0;background:var(--text);color:white;z-index:150;transform:translateY(100%);transition:transform .25s}
.batch-bar.show{transform:translateY(0)}
.batch-bar-header{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;cursor:pointer;user-select:none}
.batch-bar-title{font-size:14px;font-weight:700}
.batch-bar-count{background:var(--yellow);color:white;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700;margin-left:8px}
.batch-bar-toggle{font-size:12px;transition:transform .2s}
.batch-bar.expanded .batch-bar-toggle{transform:rotate(180deg)}
.batch-bar-body{display:none;max-height:40vh;overflow-y:auto;background:var(--surface);color:var(--text);border-top:1px solid var(--border)}
.batch-bar.expanded .batch-bar-body{display:block}
.batch-bar-actions{display:flex;gap:8px;padding:10px 24px;background:var(--surface);border-top:1px solid var(--border)}
.batch-bar.expanded .batch-bar-actions{display:flex}
.batch-bar:not(.expanded) .batch-bar-actions{display:none}
.bb-table{width:100%;border-collapse:collapse;font-size:13px}
.bb-table th{text-align:left;padding:8px 16px;background:var(--tag-bg);font-size:11px;font-weight:700;color:var(--text-muted)}
.bb-table td{padding:6px 16px;border-bottom:1px solid var(--border)}
.bb-table tr:hover{background:var(--tag-bg)}
.bb-table .bb-edit{color:var(--blue);cursor:pointer;text-decoration:underline}
.bb-table .bb-del{color:var(--accent);cursor:pointer;border:none;background:none;font-size:15px;padding:2px 6px}
body{padding-bottom:52px}
/* Split layout */
.split-layout{display:flex;gap:0;min-height:60vh}
.left-panel{width:480px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow-y:auto;max-height:calc(100vh - 180px);position:sticky;top:68px}
.splitter{width:8px;flex-shrink:0;cursor:col-resize;background:transparent;position:relative;align-self:stretch}
.splitter:hover,.splitter.dragging{background:var(--accent-light)}
.splitter::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:2px;height:40px;background:var(--border);border-radius:2px}
.splitter:hover::before,.splitter.dragging::before{background:var(--accent)}
.right-panel{flex:1;min-width:0;margin-left:8px}
.list-item{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;transition:background .1s}
.list-item:last-child{border-bottom:none}
.list-item:hover{background:var(--tag-bg)}
.list-item.active{background:var(--accent-light);border-left:3px solid var(--accent)}
.list-item.in-batch{background:var(--green-light)}
.list-item.in-batch .list-name::after{content:' \u2705';font-size:10px;margin-left:4px}
.list-seq{font-family:var(--mono);font-size:12px;color:var(--text-muted);min-width:24px}
.list-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.list-badge{flex-shrink:0}
.right-detail{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px}
.right-detail-header{font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.right-empty{text-align:center;padding:80px 20px;color:var(--text-muted)}
.right-empty .icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<header>
  <div class="logo">🥟 <span>包子媽</span> 開團助手</div>
  <div class="header-status" id="headerStatus">就緒</div>
</header>
<div class="container">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;">
    <input class="date-input" id="targetDate" type="date" style="font-size:15px;padding:10px 14px;">
    <button class="btn btn-green" onclick="fetchCalendar()" id="fetchBtn" style="font-size:14px;padding:10px 20px;">📅 讀取今日商品</button>
    <button class="btn btn-secondary" onclick="refreshBotItems()" id="refreshBotBtn" style="font-size:14px;padding:10px 20px;">🔄 重新整理文案</button>
    <button class="btn btn-secondary" onclick="reloadLeleProducts()" id="reloadLeleBtn" style="font-size:14px;padding:10px 20px;">🔄 重載商品庫</button>
    <div id="log" style="flex:1;font-family:monospace;font-size:12px;color:#7a7060;"></div>
  </div>
  <div id="resultsArea" style="display:none;">
    <div class="stats-row" id="statsRow"></div>
    <div class="tabs">
      <div class="tab active" onclick="filterResults('all',this)">全部</div>
      <div class="tab" onclick="filterResults('matched',this)">✅ 已比對</div>
      <div class="tab" onclick="filterResults('new',this)">🆕 新品</div>
    </div>
    <div class="split-layout">
      <div class="left-panel" id="leftPanel"></div>
      <div class="splitter" id="splitter" title="拖曳調整寬度"></div>
      <div class="right-panel" id="rightPanel"><div class="right-empty"><div class="icon">\ud83d\udc48</div><p>\u9ede\u64ca\u5de6\u5074\u5546\u54c1\u67e5\u770b\u8a73\u60c5</p></div></div>
    </div>
  </div>
  <div id="emptyState" class="empty-state" style="display:none;">
    <div class="icon">📋</div><p>今日日曆沒有商品事件</p>
  </div>

</div>

<!-- 底部浮動批次 bar -->
<div class="batch-bar" id="batchBar">
  <div class="batch-bar-header" onclick="toggleBatchBar()">
    <div><span class="batch-bar-title">📦 批次上架</span><span class="batch-bar-count" id="batchCount">0</span></div>
    <span class="batch-bar-toggle">▲</span>
  </div>
  <div class="batch-bar-body" id="batchBody"></div>
  <div class="batch-bar-actions">
    <button class="btn btn-blue" onclick="exportXLS()" style="font-size:13px;">📥 匯出 XLS</button>
    <button class="btn btn-green" onclick="exportForERP()" style="font-size:13px;">📤 匯出 ERP 匯入檔</button>
    <button class="btn btn-accent" onclick="clearBatch()" style="font-size:13px;">🗑️ 清除全部</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">整理上架</h3>
    <label>商品名稱</label>
    <input id="mName" type="text">
    <div id="mErpDup" style="font-size:12px;margin-top:4px;display:none;"></div>
    <label>售價</label>
    <input id="mPrice" type="number">
    <label>結單日（M/D）<span style="color:var(--accent);font-weight:500;font-size:11px;margin-left:6px;">請確定結單日是否正確</span></label>
    <input id="mCloseDate" type="text" placeholder="例：4/10">
    <div id="mTempRow" style="display:none;">
      <label>溫度</label>
      <select id="mTemp"><option value="冷凍">冷凍</option><option value="冷藏">冷藏</option><option value="常溫" selected>常溫</option></select>
    </div>
    <label>款式明細</label>
    <table class="modal-styles-table" id="mStylesTable">
      <thead><tr><th>款式名稱</th><th>售價</th><th></th></tr></thead>
      <tbody id="mStylesBody"></tbody>
    </table>
    <button class="btn btn-secondary" onclick="addModalStyleRow('','')" style="margin-top:6px;font-size:12px;">+ 新增款式</button>
    <label>商品描述</label>
    <button class="btn btn-secondary" onclick="reparseDesc()" style="margin-bottom:6px;font-size:12px;">🔍 解析文案</button>
    <textarea id="mDesc"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-green" onclick="confirmModal()">加入清單</button>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://asugjynpocwygggttxyo.supabase.co';
var SUPABASE_KEY = 'sb_publishable_cG0dslg6JnSwOtPSBko2Eg_VB0NtbTW';
var GCAL_API_KEY = 'AIzaSyCMTlpH-m6jeOGy0_qjnpP9GaFlqSzedZM';
var GCAL_CAL_ID = 'j5pqf76fhd0all9mf25oddokc0@group.calendar.google.com';
var MATCH_THRESHOLD = 0.5;  // 比對門檻：低於此分數視為新品
var LELE_CACHE_KEY = 'lt_lele_products_cache';
var LELE_CACHE_TTL = 24 * 60 * 60 * 1000;  // 24 小時
var calendarItems = [];
var matchResults = [];
var currentFilter = 'all';
var botItems = [];
var botTextMap = {};
var batchList = [];
var modalCtx = null; // 目前 modal 對應的資料
var selectedIdx = 0;
var allLeleProducts = [];  // 全部樂樂商品（本地快取）

var EMOJI_LIST = ['\u2764\ufe0f','\ud83d\udea9','\u2728','\ud83c\udf89','\ud83d\udc4d','\ud83d\udd14','\ud83d\ude18','\ud83e\udd70','\ud83c\udf80','\ud83d\udc49','\ud83e\udee0','\ud83c\udf88','\ud83c\udf81','\ud83d\uded2','\ud83d\udc8e','\ud83d\udc8b','\ud83d\udcde','\ud83d\udccd','\ud83d\udccc','\u23f0','\ud83c\udf08','\u26a1','\ud83d\udd25','\ud83d\udca5','\ud83d\udeab','\u2753','\u2757','\u203c\ufe0f','\u2049\ufe0f','\ud83d\udcaf'];

window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('targetDate').value = new Date().toISOString().split('T')[0];
  fetchBotItems();
  loadAllLeleProducts();
  renderBatch();
  // 溫度改變時即時重算編號（新品）
  document.getElementById('mTemp').addEventListener('change', function() {
    rebuildNewMName();
  });
  // 售價、結單日改變時更新 mName
  document.getElementById('mPrice').addEventListener('input', updateMNameFields);
  document.getElementById('mCloseDate').addEventListener('input', updateMNameFields);
  document.getElementById('mName').addEventListener('input', debouncedCheckErpDup);
  // 還原左欄寬度
  var savedW = parseInt(localStorage.getItem('lt_left_panel_width'), 10);
  if (savedW && savedW >= 200 && savedW <= 1000) {
    document.getElementById('leftPanel').style.width = savedW + 'px';
  }
  // 拖曳分隔線
  var splitter = document.getElementById('splitter');
  var leftPanel = document.getElementById('leftPanel');
  var dragging = false;
  splitter.addEventListener('mousedown', function(e) {
    dragging = true;
    splitter.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var rect = leftPanel.getBoundingClientRect();
    var newW = e.clientX - rect.left;
    if (newW < 200) newW = 200;
    if (newW > 1000) newW = 1000;
    leftPanel.style.width = newW + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false;
    splitter.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    localStorage.setItem('lt_left_panel_width', parseInt(leftPanel.style.width, 10));
  });
});

// ── Bot items ──
function fetchBotItems() {
  fetch('https://group-buy-bot.onrender.com/today', { cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        botItems = data.data || [];
        document.getElementById('headerStatus').textContent = '\u6587\u6848\u5eab ' + botItems.length + ' \u7b46';
      }
    }).catch(function(e) { console.log('Bot API:', e.message); });
}

function refreshBotItems() {
  var btn = document.getElementById('refreshBotBtn');
  btn.disabled = true;
  btn.textContent = '\u66f4\u65b0\u4e2d\u2026';
  fetch('https://group-buy-bot.onrender.com/today', { cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        botItems = data.data || [];
        document.getElementById('headerStatus').textContent = '\u6587\u6848\u5eab ' + botItems.length + ' \u7b46';
        if (matchResults.length) renderFiltered();
      }
    }).catch(function(e) { console.log('Bot API:', e.message); })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = '\ud83d\udd04 \u91cd\u65b0\u6574\u7406\u6587\u6848';
    });
}

// ── 載入全部樂樂商品（本地快取）──
function loadAllLeleProducts(forceReload) {
  var btn = document.getElementById('reloadLeleBtn');
  // 嘗試讀 cache
  if (!forceReload) {
    try {
      var cached = localStorage.getItem(LELE_CACHE_KEY);
      if (cached) {
        var obj = JSON.parse(cached);
        if (obj && obj.ts && (Date.now() - obj.ts < LELE_CACHE_TTL) && obj.data && obj.data.length) {
          allLeleProducts = obj.data;
          if (btn) btn.textContent = '\ud83d\udd04 \u5546\u54c1\u5eab ' + allLeleProducts.length + ' \u7b46';
          return;
        }
      }
    } catch(e) { console.log('cache read fail:', e); }
  }
  // 從 Supabase 撈
  if (btn) { btn.disabled = true; btn.textContent = '\u8f09\u5165\u4e2d\u2026'; }
  var fields = 'id,title,price_min,price_max,img_url,feed_id,styles,description';
  // 分頁撈，避免 1000 筆預設限制
  var allRows = [];
  function fetchPage(offset) {
    var url = SUPABASE_URL + '/rest/v1/gb_lele_products?select=' + fields + '&order=id.desc&limit=1000&offset=' + offset;
    return fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } })
      .then(function(r) { return r.json(); })
      .then(function(rows) {
        if (!rows || !rows.length) return null;
        allRows = allRows.concat(rows);
        if (btn) btn.textContent = '\u8f09\u5165\u4e2d ' + allRows.length + '\u2026';
        if (rows.length === 1000) return fetchPage(offset + 1000);
        return null;
      });
  }
  fetchPage(0).then(function() {
    allLeleProducts = allRows;
    // 寫入 localStorage 時瘦身：移除 description（最佔空間，比對也用不到）
    try {
      var slim = allRows.map(function(r) {
        return {
          id: r.id, title: r.title, price_min: r.price_min, price_max: r.price_max,
          img_url: r.img_url, feed_id: r.feed_id, styles: r.styles
        };
      });
      localStorage.setItem(LELE_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: slim }));
    } catch(e) {
      console.log('cache write fail:', e);
      // 寫不進就清掉，下次照樣從網路撈
      try { localStorage.removeItem(LELE_CACHE_KEY); } catch(_) {}
    }
    if (btn) { btn.disabled = false; btn.textContent = '\ud83d\udd04 \u5546\u54c1\u5eab ' + allLeleProducts.length + ' \u7b46'; }
  }).catch(function(err) {
    if (btn) { btn.disabled = false; btn.textContent = '\u26a0 \u8f09\u5165\u5931\u6557'; }
    console.log('load lele fail:', err);
  });
}

function reloadLeleProducts() {
  loadAllLeleProducts(true);
}

// ── ERP products 查重 ──
var erpDupTimer = null;
var erpDupCache = {};  // { id: { name } | null }

function debouncedCheckErpDup() {
  if (erpDupTimer) clearTimeout(erpDupTimer);
  erpDupTimer = setTimeout(checkErpDup, 400);
}

function checkErpDup() {
  var mName = document.getElementById('mName').value;
  var dupEl = document.getElementById('mErpDup');
  // 從 mName 抓 #...# 編號
  var idMatch = mName.match(/#([^#]+)#/);
  if (!idMatch) { dupEl.style.display = 'none'; return; }
  var id = idMatch[1].trim();
  if (!id) { dupEl.style.display = 'none'; return; }
  // cache hit
  if (erpDupCache.hasOwnProperty(id)) {
    showErpDup(id, erpDupCache[id]);
    return;
  }
  // 查 ERP
  fetch(SUPABASE_URL + '/rest/v1/products?id=eq.' + encodeURIComponent(id) + '&select=id,name&limit=1', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  }).then(function(r) { return r.json(); }).then(function(rows) {
    var hit = (rows && rows.length) ? rows[0] : null;
    erpDupCache[id] = hit;
    showErpDup(id, hit);
  }).catch(function(e) { console.log('checkErpDup fail:', e); });
}

function showErpDup(id, hit) {
  var dupEl = document.getElementById('mErpDup');
  if (hit) {
    dupEl.style.display = 'block';
    dupEl.style.color = '#c0392b';
    dupEl.textContent = '\u26a0 ERP \u5df2\u6709\u6b64\u7de8\u865f\uff1a' + hit.name;
  } else {
    dupEl.style.display = 'none';
  }
}

// 批次查 ERP（給匯出用）
function batchCheckErp(ids) {
  if (!ids || !ids.length) return Promise.resolve({});
  // 過濾 cache
  var toQuery = ids.filter(function(id) { return !erpDupCache.hasOwnProperty(id); });
  var result = {};
  ids.forEach(function(id) { if (erpDupCache.hasOwnProperty(id)) result[id] = erpDupCache[id]; });
  if (!toQuery.length) return Promise.resolve(result);
  // 用 in.() 一次查
  var idList = toQuery.map(function(i) { return '"' + i.replace(/"/g, '') + '"'; }).join(',');
  var url = SUPABASE_URL + '/rest/v1/products?id=in.(' + encodeURIComponent(idList) + ')&select=id,name,price,category';
  return fetch(url, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  }).then(function(r) { return r.json(); }).then(function(rows) {
    var map = {};
    (rows || []).forEach(function(row) { map[row.id] = row; });
    toQuery.forEach(function(id) {
      var hit = map[id] || null;
      erpDupCache[id] = hit;
      result[id] = hit;
    });
    return result;
  });
}

// ── expandParenChars: 括號字元替換（唯一的清理入口）──
function expandParenChars(str) {
  str = str.replace(/\(emoji\)/gi, '');
  str = str.replace(/\(\$\)/g, '$');
  str = str.replace(/\(\/\)/g, '/');
  str = str.replace(/\(!\)/g, '!');
  str = str.replace(/\(\?\)/g, '?');
  str = str.replace(/\(heart\)/gi, '');
  str = str.replace(/\(wink\)/gi, '');
  str = str.replace(/(\(\d+\))+/g, function(m) { return m.replace(/\((\d+)\)/g, '$1'); });
  str = str.replace(/\(([a-zA-Z])\)/g, '$1');
  return str;
}

// ── cleanText: 用於顯示（展開括號 + 壓縮空行）──
function cleanText(text) {
  text = expandParenChars(text);
  var lines = text.split('\n');
  for (var i = 0; i < lines.length - 1; i++) {
    if (lines[i].trim() === '\u5230\u8ca8\u901a\u77e5' && lines[i+1].trim() && lines[i+1].indexOf('\u7d50\u55ae') === -1) {
      lines[i+1] = lines[i+1].trim() + '\u7d50\u55ae';
    }
  }
  text = lines.join('\n');
  text = text.replace(/\n{3,}/g, '\n\n');
  return text.trim();
}

// ── parseBotText: 必須傳入原始文案（含 (emoji)($) 等）──
function parseBotText(rawText) {
  if (!rawText) return { name: '', price: '', date: '', desc: '', subs: [] };
  // Step 1: 先展開括號
  var cleaned = expandParenChars(rawText);
  // Step 2: 在原始文案上逐行掃描（保留 (A) 格式給 subs 偵測）
  var rawLines = rawText.split('\n');
  var cleanLines = cleaned.split('\n');
  var name = '', price = '', date = '';
  var subs = [];
  for (var i = 0; i < cleanLines.length; i++) {
    var t = cleanLines[i].trim();
    var raw = rawLines[i] ? rawLines[i].trim() : '';
    if (!t) continue;
    // 第一個非空行 = 品名
    if (!name) { name = t; continue; }
    // 售價: $數字（只取第一個）
    if (!price) {
      var pm = t.match(/\$(\d+)/);
      if (pm) { price = pm[1]; continue; }
    }
    // 結單日: M/D結單 or 短行純 M/D
    if (!date) {
      var dm = t.match(/(\d{1,2}\/\d{1,2})\u7d50\u55ae/);
      if (dm) { date = dm[1]; continue; }
      if (t.length < 10) {
        var dm2 = t.match(/^(\d{1,2}\/\d{1,2})$/);
        if (dm2) { date = dm2[1]; continue; }
      }
    }
    // 款式: 原始行含 (A)xxx (B)xxx（用 raw 偵測，因為清理後 (A) 已變成 A）
    var subMatch = raw.match(/^\(?([A-Za-z])\)\s*(.+)/);
    if (subMatch) {
      // 清理款式名稱裡的括號格式
      var subName = expandParenChars(subMatch[2].trim());
      // 款式行本身可能有 $數字
      var subPriceMatch = subName.match(/\$(\d+)/);
      var subPrice = subPriceMatch ? subPriceMatch[1] : '';
      // 如果本行沒價格，往下一行找 $數字
      if (!subPrice) {
        var nextLine = (cleanLines[i + 1] || '').trim();
        var nextPm = nextLine.match(/\$(\d+)/);
        if (nextPm) subPrice = nextPm[1];
      }
      subs.push({ letter: subMatch[1].toUpperCase(), name: '(' + subMatch[1].toUpperCase() + ')' + subName, price: subPrice });
      continue;
    }
  }
  // desc = 整段清理後的文案
  var desc = cleaned.replace(/\n{3,}/g, '\n\n').trim();
  return { name: name, price: price, date: date, desc: desc, subs: subs };
}

// ── Clean calendar name ──
function cleanCalName(name) {
  // 去掉 ⬜
  name = name.replace(/\u2b1c/g, '');
  // 去掉 💰數字 部分
  name = name.replace(/\ud83d\udcb0\s*\d+/g, '');
  // 去掉 ⏰M/D結單 部分
  name = name.replace(/\u23f0\s*\d{1,2}\/\d{1,2}\s*\u7d50\u55ae/g, '');
  // 去掉 #...# 部分
  name = name.replace(/#[^#]*#/g, '');
  return name.replace(/\s+/g, ' ').trim();
}

// ── Parse price from name or text ──
function parsePriceFromText(text) {
  if (!text) return '';
  // 💰數字
  var m = text.match(/\ud83d\udcb0\s*(\d+)/);
  if (m) return m[1];
  // ($)(數字) format (LINE)
  if (/\(\$\)/.test(text)) {
    var expanded = expandParenChars(text);
    var m2 = expanded.match(/\$(\d+)/);
    if (m2) return m2[1];
  }
  // $數字 or ＄數字
  var m3 = text.match(/[\$\uff04]\s*(\d+)/);
  if (m3) return m3[1];
  return '';
}

// ── Parse close date from name or text ──
function parseCloseDateFromText(text) {
  if (!text) return '';
  // ⏰M/D結單
  var m = text.match(/\u23f0\s*(\d{1,2}\/\d{1,2})\s*\u7d50\u55ae/);
  if (m) return m[1];
  // (數字)(/)(數字) LINE format
  if (/\(\d\)\(\/\)/.test(text)) {
    var expanded = expandParenChars(text);
    var m2 = expanded.match(/(\d{1,2}\/\d{1,2})/);
    if (m2) return m2[1];
  }
  // 到貨通知 next line
  var lines = text.split('\n');
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].trim() === '\u5230\u8ca8\u901a\u77e5' && i + 1 < lines.length) {
      var dm = lines[i+1].trim().match(/(\d{1,2}\/\d{1,2})/);
      if (dm) return dm[1];
    }
  }
  // M/D結單
  var cm = text.match(/(\d{1,2}\/\d{1,2})\u7d50\u55ae/);
  if (cm) return cm[1];
  return '';
}

// ── Auto-detect temp code from name ──
function detectTempCode(name) {
  if (/\u51b7\u51cd/.test(name)) return '1';
  if (/\u51b7\u85cf/.test(name)) return '2';
  return '3';
}

// ── 商品編號產生 ──
// 9碼：溫度(1) + 年尾(1) + 月日(4) + 序號(2) + 細項碼(1)
function generateProductId(tempCode, seq, subIdx) {
  var dateStr = document.getElementById('targetDate').value; // YYYY-MM-DD
  var yearDigit = dateStr.slice(3, 4); // 2026 → 6
  var mm = dateStr.slice(5, 7);
  var dd = dateStr.slice(8, 10);
  var seqStr = String(seq).padStart(2, '0');
  var sub = String(subIdx); // 0=無細項, 1=A, 2=B...
  return tempCode + yearDigit + mm + dd + seqStr + sub;
}

// 取得8碼前綴（不含細項碼）
function generateProductId8(tempCode, seq) {
  var dateStr = document.getElementById('targetDate').value;
  var yearDigit = dateStr.slice(3, 4);
  var mm = dateStr.slice(5, 7);
  var dd = dateStr.slice(8, 10);
  var seqStr = String(seq).padStart(2, '0');
  return tempCode + yearDigit + mm + dd + seqStr;
}

// 重組新品 mName（根據當前 Modal 狀態）
function rebuildNewMName() {
  if (!modalCtx || !modalCtx.isNew) return;
  var tempSelect = document.getElementById('mTemp');
  var temp = tempSelect.value;
  var tempCode = temp === '\u51b7\u51cd' ? '1' : temp === '\u51b7\u85cf' ? '2' : '3';
  var seq = modalCtx.globalSeq || 0;
  var productName = modalCtx.productName || '';
  var price = document.getElementById('mPrice').value;
  var closeDate = document.getElementById('mCloseDate').value;

  // 檢查有沒有款式
  var styleRows = document.getElementById('mStylesBody').querySelectorAll('tr');
  var hasSubs = styleRows.length > 0;

  if (hasSubs) {
    // 有細項：商品名稱用 #8碼（不閉合）
    var id8 = generateProductId8(tempCode, seq);
    var title = '\u2b1c' + productName + '\ud83d\udcb0' + price + '\u23f0' + closeDate + '\u7d50\u55ae#' + id8;
    document.getElementById('mName').value = title;
    // 每個款式自動加 #9碼#
    styleRows.forEach(function(tr, si) {
      var nameInput = tr.querySelector('input[type="text"]');
      if (!nameInput) return;
      var styleName = nameInput.value;
      // 去掉舊的 #...# 再加新的
      styleName = styleName.replace(/#\d*#?/g, '').trim();
      var subId = generateProductId(tempCode, seq, si + 1);
      nameInput.value = styleName + '#' + subId + '#';
    });
  } else {
    // 無細項：商品名稱用 #9碼#（閉合）
    var id9 = generateProductId(tempCode, seq, 0);
    var title = '\u2b1c' + productName + '\ud83d\udcb0' + price + '\u23f0' + closeDate + '\u7d50\u55ae#' + id9 + '#';
    document.getElementById('mName').value = title;
  }
}

// 售價或結單日改變時，更新 mName 裡的對應部分
function updateMNameFields() {
  var mName = document.getElementById('mName');
  var val = mName.value;
  if (!val) return;
  var newPrice = document.getElementById('mPrice').value;
  var newDate = document.getElementById('mCloseDate').value;
  // 新品走 rebuildNewMName
  if (modalCtx && modalCtx.isNew) {
    rebuildNewMName();
    return;
  }
  // 舊商品：直接替換 mName 裡的 💰數字 和 ⏰...結單
  val = val.replace(/\ud83d\udcb0\d*/, '\ud83d\udcb0' + newPrice);
  val = val.replace(/\u23f0[^\u7d50]*\u7d50\u55ae/, '\u23f0' + newDate + '\u7d50\u55ae');
  mName.value = val;
}

// ── findBotItem ──
function findBotItem(calName) {
  if (!botItems.length) return null;
  var clean = calName.replace(/[^\u4e00-\u9fffa-zA-Z0-9]/g, '').toLowerCase();
  if (!clean || clean.length < 2) return null;
  var best = null, bestScore = 0;
  for (var i = 0; i < botItems.length; i++) {
    var item = botItems[i];
    var bn = (item.productName || '').replace(/[^\u4e00-\u9fffa-zA-Z0-9]/g, '').toLowerCase();
    if (!bn) continue;
    var score = 0;
    if (bn === clean) score = 1;
    else if (bn.indexOf(clean) !== -1 || clean.indexOf(bn) !== -1) score = 0.9;
    else if (clean.length >= 3 && bn.indexOf(clean.slice(0, 3)) !== -1) score = 0.7;
    else if (bn.length >= 3 && clean.indexOf(bn.slice(0, 3)) !== -1) score = 0.7;
    if (score > bestScore) { bestScore = score; best = item; }
  }
  return bestScore >= 0.7 ? best : null;
}

// ── Extract search keyword from calendar name ──
function extractSearchKey(name) {
  // 去掉括號格式 ($)(emoji)(數字)(/) 等
  var s = name.replace(/\([^)]*\)/g, '');
  // 去掉 #...#、💰數字、⏰日期結單、⬜
  s = s.replace(/#[^#]*#/g, '').replace(/\ud83d\udcb0\s*\d+/g, '').replace(/\u23f0[^結]*\u7d50\u55ae/g, '').replace(/\u2b1c/g, '');
  // 去掉 ±%*（）
  s = s.replace(/[±%*（）\[\]]/g, '');
  // 提取中文字
  var cjk = s.replace(/[^\u4e00-\u9fff]/g, '');
  // 如果有）或）後面的內容，取後面的（去掉品牌前綴如「禾田）」）
  var brandCut = name.indexOf('\uff09');
  if (brandCut === -1) brandCut = name.indexOf(')');
  if (brandCut !== -1) {
    var after = name.slice(brandCut + 1).replace(/[^\u4e00-\u9fff]/g, '');
    if (after.length >= 2) cjk = after;
  }
  return cjk.slice(0, 5);
}

// ── 本地比對（從 allLeleProducts 找最相似商品）──
function searchLocal(keyword) {
  if (!allLeleProducts || !allLeleProducts.length) return null;
  var best = null, bestScore = 0;
  for (var i = 0; i < allLeleProducts.length; i++) {
    var row = allLeleProducts[i];
    // 比 title（主要依據）
    var s = similarity(keyword, row.title || '');
    // 也比每個 style.name，但打 0.85 折（避免短款式名亂中分）
    if (row.styles && row.styles.length) {
      for (var j = 0; j < row.styles.length; j++) {
        var styleName = row.styles[j].name || '';
        // 太短的款式名（< 4 中文字）跳過，避免「紅色」「原味」之類亂配
        if (styleName.replace(/[^\u4e00-\u9fff]/g, '').length < 4) continue;
        var ss = similarity(keyword, styleName) * 0.85;
        if (ss > s) s = ss;
      }
    }
    if (s > bestScore) { bestScore = s; best = row; }
  }
  if (!best || bestScore < MATCH_THRESHOLD) return null;
  return {
    id: best.id, title: best.title, priceMin: best.price_min, priceMax: best.price_max,
    imgUrl: best.img_url, feedId: best.feed_id,
    styles: (best.styles || []).map(function(s) { return { name: s.name, price: s.price, cost: s.cost }; }),
    description: best.description || '',
    score: bestScore
  };
}

// ── Calendar ──
function fetchCalendar() {
  var dateStr = document.getElementById('targetDate').value;
  if (!dateStr) { setLog('\u26a0 \u8acb\u9078\u64c7\u65e5\u671f'); return; }
  var btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> \u8b80\u53d6\u4e2d\u2026';
  setLog('\u9023\u7dda\u4e2d\u2026');
  var dayStart = new Date(dateStr + 'T00:00:00+08:00').toISOString();
  var dayEnd = new Date(dateStr + 'T23:59:59+08:00').toISOString();
  var url = 'https://www.googleapis.com/calendar/v3/calendars/' + encodeURIComponent(GCAL_CAL_ID) + '/events'
    + '?key=' + GCAL_API_KEY + '&timeMin=' + encodeURIComponent(dayStart) + '&timeMax=' + encodeURIComponent(dayEnd)
    + '&singleEvents=true&orderBy=startTime&maxResults=100';
  fetch(url).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(r) {
      if (!r.ok) throw new Error((r.data.error && r.data.error.message) || 'HTTP error');
      calendarItems = (r.data.items || []).map(function(ev) {
        var start = ev.start && ev.start.dateTime ? ev.start.dateTime : '';
        var t = '';
        if (start) { try { t = new Date(start).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Taipei' }); } catch(e) {} }
        return { name: ev.summary || '', time: t };
      }).filter(function(ev) { return ev.name; });
      setLog('\u2713 \u8b80\u53d6\u5230 ' + calendarItems.length + ' \u500b\u4e8b\u4ef6');
      if (!calendarItems.length) showEmpty(); else runMatch();
    })
    .catch(function(err) { setLog('\u2717 ' + err.message); })
    .finally(function() { btn.disabled = false; btn.innerHTML = '\ud83d\udcc5 \u8b80\u53d6\u4eca\u65e5\u5546\u54c1'; });
}

// ── Matching ──
function tokenize(str) {
  // 去掉括號格式 ($)(emoji)(數字)(/) 等
  var s = str.replace(/\([^)]*\)/g, '');
  // 去掉 #...#、$數字、日期結單、emoji
  s = s.replace(/#[^#]*#/g, '').replace(/[\$\uff04][\d,]+/g, '').replace(/\d+\/\d+\u7d50\u55ae/g, '');
  // 去掉 ±%*（）⬜💰⏰ 等符號
  s = s.replace(/[±%*（）\u2b1c\ud83d\udcb0\u23f0]/g, '');
  // 去掉數字+單位（g ml 入 片 包 顆 條 罐 瓶 盒 袋 組 份 支 杯 碗 塊 個 粒 串 尾 隻 斤 公斤 kg）
  s = s.replace(/\d+\s*(g|ml|kg|入|片|包|顆|條|罐|瓶|盒|袋|組|份|支|杯|碗|塊|個|粒|串|尾|隻|斤|公斤)/gi, '');
  // 去掉剩餘數字
  s = s.replace(/\d+/g, '');
  // 只留中文字
  return s.replace(/[^\u4e00-\u9fff\u3400-\u4dbf]/g, '').trim();
}
function similarity(a, b) {
  var ta = tokenize(a), tb = tokenize(b);
  if (!ta || !tb || ta.length < 2 || tb.length < 2) return 0;
  if (tb.indexOf(ta) !== -1) return 0.95;
  if (ta.indexOf(tb) !== -1) return 0.90;
  var shorter = ta.length < tb.length ? ta : tb;
  var longer = ta.length < tb.length ? tb : ta;
  // 最長共同子字串
  var maxLen = 0;
  for (var i = 0; i < shorter.length; i++)
    for (var j = i + 2; j <= shorter.length; j++) {
      var sub = shorter.slice(i, j);
      if (longer.indexOf(sub) !== -1 && sub.length > maxLen) maxLen = sub.length;
    }
  // 字元 set 交集（忽略順序，能容忍中間夾雜英文/數字）
  var setA = new Set(ta), setB = new Set(tb);
  var common = 0; setA.forEach(function(c) { if (setB.has(c)) common++; });
  // 連續子字串占短字串比例（要求至少 3 字共同，避免單字巧合）
  var subScore = (maxLen >= 3) ? maxLen / shorter.length : 0;
  // 「短字串字元」有多少比例出現在長字串裡
  // 要求短字串至少 4 字，且覆蓋率必須 ≥ 0.8（避免「噴霧式油瓶」中 3 字命中就過關）
  var shorterSet = ta.length < tb.length ? setA : setB;
  var longerSet = ta.length < tb.length ? setB : setA;
  var shorterIn = 0; shorterSet.forEach(function(c) { if (longerSet.has(c)) shorterIn++; });
  var rawCover = (shorter.length >= 4) ? shorterIn / shorterSet.size : 0;
  var coverScore = (rawCover >= 0.8) ? rawCover : 0;
  // 三種分數取最大：連續子字串、字元覆蓋率（×0.85）、jaccard 相似度
  var jaccard = (2 * common) / (setA.size + setB.size);
  return Math.max(subScore * 0.9, coverScore * 0.85, jaccard * 0.7);
}

function runMatch() {
  if (!allLeleProducts || !allLeleProducts.length) {
    setLog('\u26a0 \u5546\u54c1\u5eab\u672a\u8f09\u5165\uff0c\u8acb\u9ede\u300c\u91cd\u8f09\u5546\u54c1\u5eab\u300d');
    return;
  }
  setLog('\u672c\u5730\u6bd4\u5c0d\u4e2d\u2026 (' + allLeleProducts.length + ' \u7b46\u5546\u54c1)');
  matchResults = [];
  for (var i = 0; i < calendarItems.length; i++) {
    var item = calendarItems[i];
    var result = searchLocal(item.name);
    matchResults.push({ calItem: item, match: result || null, score: result ? result.score : 0, isNew: !result });
  }
  var matched = matchResults.filter(function(r) { return !r.isNew; }).length;
  setLog('\u2713 \u6bd4\u5c0d\u5b8c\u6210\uff1a' + matched + ' / ' + matchResults.length);
  renderResults();
}

// ── Render results ──
function renderResults() {
  document.getElementById('resultsArea').style.display = '';
  document.getElementById('emptyState').style.display = 'none';
  var matched = matchResults.filter(function(r) { return !r.isNew; }).length;
  var newItems = matchResults.filter(function(r) { return r.isNew; }).length;
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-box"><div class="stat-num">' + matchResults.length + '</div><div class="stat-label">\u4eca\u65e5\u5546\u54c1</div></div>' +
    '<div class="stat-box"><div class="stat-num green">' + matched + '</div><div class="stat-label">\u2705 \u5df2\u6bd4\u5c0d</div></div>' +
    '<div class="stat-box"><div class="stat-num yellow">' + newItems + '</div><div class="stat-label">\ud83c\udd95 \u65b0\u54c1</div></div>' +
    '<div class="stat-box"><div class="stat-num">' + botItems.length + '</div><div class="stat-label">\ud83d\udcf1 Bot \u6587\u6848</div></div>';
  renderFiltered();
}

function filterResults(type, el) {
  currentFilter = type;
  selectedIdx = 0;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  renderFiltered();
}

function renderFiltered() {
  var left = document.getElementById('leftPanel');
  var right = document.getElementById('rightPanel');
  var items = matchResults;
  if (currentFilter === 'matched') items = matchResults.filter(function(r) { return !r.isNew; });
  if (currentFilter === 'new') items = matchResults.filter(function(r) { return r.isNew; });
  if (!items.length) {
    left.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">\u6b64\u5206\u985e\u6c92\u6709\u9805\u76ee</div>';
    right.innerHTML = '';
    return;
  }
  botTextMap = {};
  var html = '';
  items.forEach(function(r, i) {
    var globalIdx = matchResults.indexOf(r) + 1;
    var shortName = cleanCalName(r.calItem.name) || r.calItem.name;
    var badge = r.isNew
      ? '<span class="badge badge-yellow" style="font-size:10px;padding:1px 6px;">\ud83c\udd95</span>'
      : '<span class="badge badge-green" style="font-size:10px;padding:1px 6px;">\u2705</span>';
    html += '<div class="list-item" id="list-' + i + '" onclick="selectItem(' + i + ')" data-calname="' + esc(r.calItem.name) + '">' +
      '<span class="list-seq">' + globalIdx + '</span>' +
      '<span class="list-name" title="' + esc(r.calItem.name) + '">' + esc(shortName) + '</span>' +
      '<span class="list-badge">' + badge + '</span></div>';
  });
  left.innerHTML = html;
  if (selectedIdx >= items.length) selectedIdx = 0;
  selectItem(selectedIdx);
  markBatchItems();
}

function selectItem(idx) {
  selectedIdx = idx;
  document.querySelectorAll('.list-item').forEach(function(el) { el.classList.remove('active'); });
  var activeEl = document.getElementById('list-' + idx);
  if (activeEl) {
    activeEl.classList.add('active');
    activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
  var items = getFilteredItems();
  var r = items[idx];
  if (!r) return;
  var right = document.getElementById('rightPanel');
  var globalIdx = matchResults.indexOf(r) + 1;
  var badge = r.isNew
    ? '<span class="badge badge-yellow">\ud83c\udd95 \u65b0\u54c1</span>'
    : '<span class="badge badge-green">\u2705 \u5df2\u6bd4\u5c0d ' + Math.round(r.score * 100) + '%</span>';
  var body = r.isNew ? renderNewBody(r, idx) : renderMatchBody(r, idx);
  right.innerHTML = '<div class="right-detail">' +
    '<div class="right-detail-header">' +
    '<span style="font-family:var(--mono);font-size:13px;color:var(--text-muted);">' + globalIdx + '.</span>' +
    '<span style="flex:1;">' + esc(r.calItem.name) + '</span>' +
    badge + '</div>' + body + '</div>';
  // Set up copy button listeners
  var btn = document.getElementById('bot-copy-' + idx);
  if (btn) {
    btn.addEventListener('click', function() {
      var ta = document.getElementById('bot-ta-' + idx);
      var text = ta ? ta.value : (botTextMap[idx] || '');
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '\u5df2\u8907\u88fd \u2713'; btn.classList.add('copied');
        setTimeout(function() { btn.textContent = '\u8907\u88fd\u6587\u6848'; btn.classList.remove('copied'); }, 2000);
      });
    });
  }
  var hbtn = document.getElementById('hist-copy-' + idx);
  if (hbtn) {
    hbtn.addEventListener('click', function() {
      var hta = document.getElementById('hist-ta-' + idx);
      if (!hta) return;
      navigator.clipboard.writeText(hta.value).then(function() {
        hbtn.textContent = '\u5df2\u8907\u88fd \u2713'; hbtn.classList.add('copied');
        setTimeout(function() { hbtn.textContent = '\u8907\u88fd'; hbtn.classList.remove('copied'); }, 2000);
      });
    });
  }
}

function renderItem(r, idx, seq) {
  var badge = r.isNew
    ? '<span class="badge badge-yellow">\ud83c\udd95 \u65b0\u54c1</span>'
    : '<span class="badge badge-green">\u2705 \u5df2\u6bd4\u5c0d ' + Math.round(r.score * 100) + '%</span>';
  var body = r.isNew ? renderNewBody(r, idx) : renderMatchBody(r, idx);
  return '<div class="result-item" id="item-' + idx + '">' +
    '<div class="result-header" onclick="toggleItem(' + idx + ')">' +
    '<div class="result-time">' + seq + '.</div>' +
    '<div class="result-name">' + esc(r.calItem.name) + '</div>' +
    badge + '<div class="result-toggle">\u25bc</div></div>' +
    '<div class="result-body">' + body + '</div></div>';
}

function renderMatchBody(r, idx) {
  var calItem = r.calItem, match = r.match;
  var img = match.imgUrl ? '<img class="product-img" src="' + esc(match.imgUrl) + '" onerror="this.style.display=\'none\'">' : '';
  var stylesRows = match.styles.map(function(s) {
    return '<tr><td>' + esc(s.name) + '</td><td>' + (s.price ? '$' + s.price : '\u2014') + '</td><td>' + (s.cost ? '$' + s.cost : '\u2014') + '</td></tr>';
  }).join('');
  var stylesHtml = match.styles.length ? '<div class="section-label">\u6b3e\u5f0f\u660e\u7d30</div><table class="styles-table"><tr><th>\u6b3e\u5f0f</th><th>\u552e\u50f9</th><th>\u6210\u672c</th></tr>' + stylesRows + '</table>' : '';
  var copyLines = ['\u3010' + calItem.name + '\u3011'];
  if (match.styles.length) match.styles.forEach(function(s) { copyLines.push(s.name + '\u3000$' + s.price); });
  else if (match.priceMin) copyLines.push('\u552e\u50f9\uff1a$' + match.priceMin);
  var copyText = copyLines.join('\n');
  var botHtml = renderBotBlock(calItem, idx);
  var histDescHtml = '';
  if (match.description) {
    histDescHtml = '<div class="bot-block" style="background:#f0f0ff;border-color:#c0c0e8;">' +
      '<div class="bot-block-title" style="color:#6c5ce7;">\ud83d\udccb \u6b77\u53f2\u6587\u6848</div>' +
      '<div style="display:flex;gap:6px;margin-bottom:8px;">' +
      '<button class="copy-btn-sm" id="hist-copy-' + idx + '">\u8907\u88fd</button>' +
      '</div>' +
      '<textarea id="hist-ta-' + idx + '" style="width:100%;min-height:120px;font-family:var(--sans);font-size:13px;line-height:1.7;border:1px solid #c0c0e8;border-radius:4px;padding:8px;background:white;resize:vertical;">' +
      esc(match.description) + '</textarea></div>';
  }
  var addBtn = '<div style="margin-top:12px;display:flex;align-items:center;gap:10px;"><button class="btn btn-green" onclick="openModal(' + idx + ',false)" style="font-size:13px;">\u2705 \u6574\u7406\u4e0a\u67b6</button><span style="color:var(--accent);font-size:12px;font-weight:700;">\u8acb\u4fee\u6539\u7d50\u55ae\u65e5</span></div>';
  return img +
    '<div class="match-lele-title">\ud83d\uddc2 ' + esc(match.title) + '</div>' +
    '<div class="match-grid"><div class="match-key">\u552e\u50f9</div><div class="match-val">' + (match.priceMin ? '$' + match.priceMin + (match.priceMax ? ' ~ $' + match.priceMax : '') : '\u2014') + '</div>' +
    '<div class="match-key">FeedID</div><div class="match-val" style="font-family:var(--mono);font-size:12px;">' + esc(match.feedId || '\u2014') + '</div></div>' +
    stylesHtml +
    '<div class="copy-block"><button class="copy-btn-sm" id="lele-copy-' + idx + '">\u8907\u88fd</button><pre id="lele-pre-' + idx + '">' + esc(copyText) + '</pre></div>' +
    histDescHtml + botHtml + addBtn;
}

function renderNewBody(r, idx) {
  var botHtml = renderBotBlock(r.calItem, idx);
  var addBtn = '<div style="margin-top:12px;display:flex;align-items:center;gap:10px;"><button class="btn btn-yellow" onclick="openModal(' + idx + ',true)" style="font-size:13px;">\ud83c\udd95 \u6574\u7406\u4e0a\u67b6</button><span style="color:var(--accent);font-size:12px;font-weight:700;">\u8acb\u4fee\u6539\u7d50\u55ae\u65e5</span></div>';
  return '<div class="new-marker">\ud83c\udd95 \u6b64\u5546\u54c1\u5728\u6a02\u6a02\u8cc7\u6599\u5eab\u4e2d\u627e\u4e0d\u5230\u5c0d\u61c9\u5546\u54c1\uff0c\u53ef\u80fd\u662f\u65b0\u54c1\u6216\u540d\u7a31\u5dee\u7570\u592a\u5927\u3002</div>' + botHtml + addBtn;
}

function renderBotBlock(calItem, idx) {
  var botItem = findBotItem(calItem.name);
  if (!botItem) return '';
  var cleaned = cleanText(botItem.text);
  botTextMap[idx] = cleaned;
  var emojiButtons = EMOJI_LIST.map(function(e) {
    return '<button class="emoji-btn" onclick="insertEmoji(' + idx + ',\'' + e + '\')">' + e + '</button>';
  }).join('');
  return '<div class="bot-block">' +
    '<div class="bot-block-title">\ud83d\udcf1 \u4f9b\u61c9\u5546\u6587\u6848</div>' +
    '<div style="display:flex;gap:6px;margin-bottom:8px;">' +
    '<button class="copy-btn-sm" id="bot-copy-' + idx + '">\u8907\u88fd\u6587\u6848</button>' +
    '<button class="copy-btn-sm" onclick="toggleEdit(' + idx + ')">\u270f\ufe0f \u7de8\u8f2f</button>' +
    '</div>' +
    '<div class="emoji-bar" id="emoji-bar-' + idx + '">' + emojiButtons + '</div>' +
    '<textarea id="bot-ta-' + idx + '" readonly style="width:100%;min-height:180px;font-family:var(--sans);font-size:13px;line-height:1.7;border:1px solid #c8e0f8;border-radius:4px;padding:8px;background:white;resize:vertical;">' +
    esc(cleaned) + '</textarea></div>';
}

function toggleEdit(idx) {
  var ta = document.getElementById('bot-ta-' + idx);
  var bar = document.getElementById('emoji-bar-' + idx);
  if (!ta) return;
  if (ta.readOnly) {
    ta.removeAttribute('readonly');
    ta.style.background = '#fffbe6';
    if (bar) bar.classList.add('show');
    ta.focus();
  } else {
    ta.readOnly = true;
    ta.style.background = 'white';
    if (bar) bar.classList.remove('show');
    botTextMap[idx] = ta.value;
  }
}

function insertEmoji(idx, emoji) {
  var ta = document.getElementById('bot-ta-' + idx);
  if (!ta || ta.readOnly) return;
  var start = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.slice(0, start) + emoji + ta.value.slice(end);
  var pos = start + emoji.length;
  ta.selectionStart = ta.selectionEnd = pos;
  ta.focus();
  botTextMap[idx] = ta.value;
}

function toggleItem(idx) { document.getElementById('item-' + idx).classList.toggle('open'); }

// lele copy delegation
document.addEventListener('click', function(e) {
  var m = e.target.id && e.target.id.match(/^lele-copy-(\d+)$/);
  if (m) {
    var pre = document.getElementById('lele-pre-' + m[1]);
    if (!pre) return;
    navigator.clipboard.writeText(pre.textContent).then(function() {

      setTimeout(function() { e.target.textContent = '\u8907\u88fd'; e.target.classList.remove('copied'); }, 2000);
    });
  }
});

function showEmpty() { document.getElementById('resultsArea').style.display = 'none'; document.getElementById('emptyState').style.display = ''; }
function setLog(msg) { document.getElementById('log').textContent = msg; }
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════
//  Modal – 整理上架
// ══════════════════════════════════════
function openModal(idx, isNew) {
  var items = getFilteredItems();
  var r = items[idx];
  if (!r) return;
  var calItem = r.calItem;
  var match = r.match;
  var botItem = findBotItem(calItem.name);
  var rawBotText = botItem ? botItem.text : '';

  modalCtx = { idx: idx, isNew: isNew, match: match, calItem: calItem, rawBotText: rawBotText };
  document.getElementById('modalTitle').textContent = isNew ? '\ud83c\udd95 \u65b0\u54c1\u4e0a\u67b6' : '\u2705 \u6574\u7406\u4e0a\u67b6';

  var tbody = document.getElementById('mStylesBody');
  tbody.innerHTML = '';

  if (!isNew && match) {
    // ── 舊商品：Supabase 資料為底，供應商文案的新價格/日期/文案覆蓋 ──
    var botParsed = parseBotText(rawBotText);
    var newPrice = botParsed.price || match.priceMin || '';
    var newDate = botParsed.date || parseCloseDateFromText(match.title || '');
    // 商品名稱：用新價格和新結單日重組舊 title，找不到 💰/⏰ 區塊則不動
    var newTitle = match.title || '';
    if (botParsed.price) {
      newTitle = newTitle.replace(/\ud83d\udcb0\s*\d+/, '\ud83d\udcb0' + botParsed.price);
    }
    if (botParsed.date) {
      newTitle = newTitle.replace(/\u23f0\s*\d{1,2}\/\d{1,2}\s*\u7d50\u55ae/, '\u23f0' + botParsed.date + '\u7d50\u55ae');
    }
    document.getElementById('mName').value = newTitle;
    document.getElementById('mPrice').value = newPrice;
    document.getElementById('mCloseDate').value = newDate;
    // 款式：名稱用 Supabase（含 #編號#），價格用供應商文案的新價覆蓋
    if (match.styles && match.styles.length) {
      // 建立字母→新價格的對照表
      var botPriceMap = {};
      if (botParsed.subs && botParsed.subs.length) {
        botParsed.subs.forEach(function(bs) { if (bs.price) botPriceMap[bs.letter] = bs.price; });
      }
      match.styles.forEach(function(s) {
        var stylePrice = s.price;
        // 從款式名稱提取字母，例如 "(a) 原味#140318014#" → "A"
        var letterMatch = (s.name || '').match(/^\(?([A-Za-z])\)/);
        if (letterMatch) {
          var letter = letterMatch[1].toUpperCase();
          if (botPriceMap[letter]) stylePrice = botPriceMap[letter];
        } else if (botParsed.price) {
          // 沒有字母款式時，用供應商文案的主售價覆蓋
          stylePrice = botParsed.price;
        }
        addModalStyleRow(s.name, stylePrice);
      });
    }
    // 描述：優先順序 供應商文案 > 歷史文案 > Supabase description
    var descText = '';
    if (rawBotText) descText = botParsed.desc;
    if (!descText) {
      var histTa = document.getElementById('hist-ta-' + idx);
      if (histTa && histTa.value) descText = histTa.value;
    }
    if (!descText && match.description) descText = match.description;
    document.getElementById('mDesc').value = descText;
  } else {
    // ── 新品：從文案解析 + 自動產生編號 ──
    var parsed = parseBotText(rawBotText);
    var price = parsed.price || '';
    var closeDate = parsed.date || parseCloseDateFromText(calItem.name);
    var productName = parsed.name || cleanCalName(calItem.name);

    // 全局序號（今天第幾樣商品）
    var globalSeq = matchResults.indexOf(r) + 1;
    modalCtx.globalSeq = globalSeq;
    modalCtx.productName = productName;

    document.getElementById('mPrice').value = price;
    document.getElementById('mCloseDate').value = closeDate;

    // 款式：從文案解析
    if (parsed.subs && parsed.subs.length) {
      parsed.subs.forEach(function(s) { addModalStyleRow(s.name, ''); });
    }
    // 描述
    document.getElementById('mDesc').value = parsed.desc || '';

    // 溫度：自動偵測，新品才顯示
    var autoTemp = detectTempCode(productName);
    var tempVal = autoTemp === '1' ? '\u51b7\u51cd' : autoTemp === '2' ? '\u51b7\u85cf' : '\u5e38\u6eab';
    document.getElementById('mTempRow').style.display = '';
    document.getElementById('mTemp').value = tempVal;

    // 自動產生編號並組合 mName
    rebuildNewMName();
  }

  // 溫度：舊商品也顯示，自動偵測
  if (!isNew) {
    document.getElementById('mTempRow').style.display = '';
    var detectName = (match && match.title) ? match.title : calItem.name;
    var autoTemp2 = detectTempCode(detectName);
    var tempVal2 = autoTemp2 === '1' ? '\u51b7\u51cd' : autoTemp2 === '2' ? '\u51b7\u85cf' : '\u5e38\u6eab';
    document.getElementById('mTemp').value = tempVal2;
  }

  document.getElementById('modalOverlay').classList.add('show');
  checkErpDup();
}

function reparseDesc() {
  var descEl = document.getElementById('mDesc');
  // 優先讀原始 BOT 文案，沒有才用 mDesc
  var text = (modalCtx && modalCtx.rawBotText) || descEl.value;
  if (!text) return;
  var parsed = parseBotText(text);

  if (modalCtx && !modalCtx.isNew && modalCtx.match) {
    // ── 舊品：套用跟 openModal 舊品分支相同的邏輯 ──
    var match = modalCtx.match;
    // 商品名稱：用新價格和新結單日重組舊 title
    var newTitle = match.title || '';
    if (parsed.price) {
      newTitle = newTitle.replace(/\ud83d\udcb0\s*\d+/, '\ud83d\udcb0' + parsed.price);
    }
    if (parsed.date) {
      newTitle = newTitle.replace(/\u23f0\s*\d{1,2}\/\d{1,2}\s*\u7d50\u55ae/, '\u23f0' + parsed.date + '\u7d50\u55ae');
    }
    document.getElementById('mName').value = newTitle;
    if (parsed.price) document.getElementById('mPrice').value = parsed.price;
    if (parsed.date) document.getElementById('mCloseDate').value = parsed.date;
    // 款式：保留 Supabase 名稱，只更新價格
    if (match.styles && match.styles.length) {
      var botPriceMap = {};
      if (parsed.subs && parsed.subs.length) {
        parsed.subs.forEach(function(bs) { if (bs.price) botPriceMap[bs.letter] = bs.price; });
      }
      var tbody = document.getElementById('mStylesBody');
      tbody.innerHTML = '';
      match.styles.forEach(function(s) {
        var stylePrice = s.price;
        var letterMatch = (s.name || '').match(/^\(?([A-Za-z])\)/);
        if (letterMatch) {
          var letter = letterMatch[1].toUpperCase();
          if (botPriceMap[letter]) stylePrice = botPriceMap[letter];
        } else if (parsed.price) {
          stylePrice = parsed.price;
        }
        addModalStyleRow(s.name, stylePrice);
      });
    }
    // 描述：完全用供應商文案
    descEl.value = parsed.desc || '';
  } else {
    // ── 新品：原本的邏輯 ──
    if (parsed.price) document.getElementById('mPrice').value = parsed.price;
    if (parsed.date) document.getElementById('mCloseDate').value = parsed.date;
    if (parsed.subs && parsed.subs.length) {
      var tbody2 = document.getElementById('mStylesBody');
      tbody2.innerHTML = '';
      parsed.subs.forEach(function(s) { addModalStyleRow(s.name, s.price || ''); });
    }
    if (parsed.desc) descEl.value = parsed.desc;
  }

  // 更新溫度（新品+舊商品都適用）
  if (modalCtx) {
    var detectName = parsed.name || (modalCtx.match && modalCtx.match.title) || '';
    var autoTemp = detectTempCode(detectName);
    var tempVal = autoTemp === '1' ? '\u51b7\u51cd' : autoTemp === '2' ? '\u51b7\u85cf' : '\u5e38\u6eab';
    document.getElementById('mTemp').value = tempVal;
    if (modalCtx.isNew) {
      if (parsed.name) modalCtx.productName = parsed.name;
      rebuildNewMName();
    } else {
      updateMNameFields();
    }
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('mErpDup').style.display = 'none';
  modalCtx = null;
}

function addModalStyleRow(name, price) {
  var tbody = document.getElementById('mStylesBody');
  var tr = document.createElement('tr');
  tr.innerHTML = '<td><input type="text" value="' + esc(name || '') + '" placeholder="\u6b3e\u5f0f\u540d\u7a31"></td>' +
    '<td><input type="number" value="' + esc(String(price || '')) + '" placeholder="\u552e\u50f9" style="width:90px;"></td>' +
    '<td><button class="del-style-btn" onclick="this.closest(\'tr\').remove()">\u2716</button></td>';
  tbody.appendChild(tr);
}

function getFilteredItems() {
  if (currentFilter === 'matched') return matchResults.filter(function(r) { return !r.isNew; });
  if (currentFilter === 'new') return matchResults.filter(function(r) { return r.isNew; });
  return matchResults;
}

function confirmModal() {
  if (!modalCtx) return;
  var name = document.getElementById('mName').value.trim();
  var price = document.getElementById('mPrice').value.trim();
  var closeDate = document.getElementById('mCloseDate').value.trim();
  var desc = document.getElementById('mDesc').value;
  var isNew = modalCtx.isNew;
  var match = modalCtx.match;

  if (!name) { alert('\u8acb\u8f38\u5165\u5546\u54c1\u540d\u7a31'); return; }
  if (!price) { alert('\u8acb\u8f38\u5165\u552e\u50f9'); return; }

  // collect styles from table
  var styles = [];
  var rows = document.getElementById('mStylesBody').querySelectorAll('tr');
  rows.forEach(function(tr) {
    var inputs = tr.querySelectorAll('input');
    var sn = inputs[0].value.trim();
    var sp = inputs[1].value.trim();
    if (sn) styles.push({ name: sn, price: sp || price });
  });

  // 從 mName 的 #...# 提取編號
  var idMatch = name.match(/#([^#]*)#/);
  var customId = idMatch ? idMatch[1] : '';
  var feedId = '';
  if (!isNew && match && match.feedId) {
    feedId = match.feedId;
  } else {
    feedId = customId;
  }
  if (!customId) customId = feedId;

  // 日曆商品名稱（用於標記）
  var calName = (modalCtx.calItem && modalCtx.calItem.name) ? modalCtx.calItem.name : '';

  var entry = {
    name: name,
    price: price,
    closeDate: closeDate,
    styles: styles,
    desc: desc,
    isNew: isNew,
    feedId: feedId,
    customId: customId,
    match: match,
    calName: calName
  };

  // 如果是編輯既有批次項目，替換而非新增
  if (typeof modalCtx.editingBatchIdx === 'number' && modalCtx.editingBatchIdx >= 0) {
    entry.calName = batchList[modalCtx.editingBatchIdx].calName || calName;
    batchList[modalCtx.editingBatchIdx] = entry;
  } else {
    batchList.push(entry);
  }

  closeModal();
  renderBatch();
  markBatchItems();
}

// ══════════════════════════════════════
//  Batch list (floating bar)
// ══════════════════════════════════════
function toggleBatchBar() {
  document.getElementById('batchBar').classList.toggle('expanded');
}

function renderBatch() {
  var bar = document.getElementById('batchBar');
  document.getElementById('batchCount').textContent = batchList.length;
  if (batchList.length) {
    bar.classList.add('show');
  } else {
    bar.classList.remove('show', 'expanded');
  }
  var body = document.getElementById('batchBody');
  if (!batchList.length) { body.innerHTML = ''; return; }
  var html = '<table class="bb-table"><tr><th>#</th><th>\u5546\u54c1\u540d\u7a31</th><th>\u552e\u50f9</th><th>\u7d50\u55ae\u65e5</th><th></th></tr>';
  batchList.forEach(function(item, i) {
    var shortName = cleanCalName(item.name);
    html += '<tr><td>' + (i+1) + '</td>' +
      '<td><span class="bb-edit" onclick="editBatch(' + i + ')">' + esc(shortName) + '</span>' +
      (item.isNew ? ' <span class="new-tag">\u65b0\u54c1</span>' : '') + '</td>' +
      '<td>$' + esc(item.price) + '</td>' +
      '<td>' + esc(item.closeDate || '\u2014') + '</td>' +
      '<td><button class="bb-del" onclick="removeBatch(' + i + ')">\u2716</button></td></tr>';
  });
  html += '</table>';
  body.innerHTML = html;
}

function editBatch(i) {
  var item = batchList[i];
  if (!item) return;
  // 開 Modal 填入該批次項目的資料讓使用者修改
  modalCtx = { idx: -1, isNew: item.isNew, match: item.match, calItem: null, rawBotText: '', editingBatchIdx: i };
  document.getElementById('modalTitle').textContent = '\u270f\ufe0f \u7de8\u8f2f\u7b2c ' + (i+1) + ' \u7b46';
  document.getElementById('mName').value = item.name;
  document.getElementById('mPrice').value = item.price;
  document.getElementById('mCloseDate').value = item.closeDate || '';
  document.getElementById('mTempRow').style.display = 'none';
  var tbody = document.getElementById('mStylesBody');
  tbody.innerHTML = '';
  if (item.styles && item.styles.length) {
    item.styles.forEach(function(s) { addModalStyleRow(s.name, s.price); });
  }
  document.getElementById('mDesc').value = item.desc || '';
  document.getElementById('modalOverlay').classList.add('show');
  checkErpDup();
}

function removeBatch(i) {
  batchList.splice(i, 1);
  renderBatch();
  markBatchItems();
}

function clearBatch() {
  if (!confirm('\u78ba\u5b9a\u8981\u6e05\u9664\u5168\u90e8 ' + batchList.length + ' \u7b46\uff1f')) return;
  batchList = [];
  renderBatch();
  markBatchItems();
}

// 標記日曆清單中已加入批次的商品
function markBatchItems() {
  var batchNames = {};
  batchList.forEach(function(item) {
    if (item.calName) batchNames[item.calName] = true;
  });
  var items = document.querySelectorAll('.list-item');
  items.forEach(function(el) {
    var name = el.getAttribute('data-calname');
    if (name && batchNames[name]) {
      el.classList.add('in-batch');
    } else {
      el.classList.remove('in-batch');
    }
  });
}

// ══════════════════════════════════════
//  Export XLS
// ══════════════════════════════════════

    '\u4fdd\u7559\u6b04\u4f4d',

    '\u5546\u54c1\u540d\u7a31',
    '\u4e3b\u8981\u5206\u985e\n(\u6b3e\u5f0f\u540d\u7a31\uff0c\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u7d30\u9805\u4e00\n(\u6b3e\u5f0f\u4e8c\u540d\u7a31\uff0c\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u7d30\u9805\u4e8c\n(\u6b3e\u5f0f\u4e09\u540d\u7a31\uff0c\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u552e\u50f9\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    'VIP\u50f9\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u6210\u672c\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u5eab\u5b58\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u50c5\u9650VIP\n(1=\u662f, \u7a7a\u767d=\u5426)',
    '\u4e0a\u67b6\u500b\u4eba\u8ce3\u5834\n(1=\u662f, \u7a7a\u767d=\u5426)',
    '\u5546\u54c1\u5206\u985e\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u50c5\u4f9b\u73fe\u8ca8\n(1=\u662f, \u7a7a\u767d=\u5426)',
    '\u7981\u6b62\u7d50\u55ae\n(1=\u662f, \u7a7a\u767d=\u5426)',
    '\u6210\u5718\u4eba\u6578',
    '\u6536\u55ae\u6642\u9593\n(yyyy/M/d  hh:mm:ss AM/PM)',
    '\u81ea\u5b9a\u7fa9\u6a19\u7c64\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u5009\u5132\u4f4d\u7f6e',
    '\u9810\u8a2d\u4f9b\u8ca8\u5546',
    '\u5546\u54c1\u63cf\u8ff0',
    '\u5546\u54c1\u5099\u8a3b',
    '\u516c\u958b\u5099\u8a3b',
    '\u6a94\u6848\u7248\u672c'
  ];

  var data = [headers];
  var dateStr = document.getElementById('targetDate').value;
  // 檔案版本標題含日期（格式：YYYYMMDD）
  headers[23] = '\u6a94\u6848\u7248\u672c\uff1a' + dateStr.replace(/-/g, '');

  batchList.forEach(function(item) {

    // 主要分類：款式名已含 #編號#（來自 Supabase），直接逗號分隔
    var mainCat = '';
    if (hasStyles) {
      mainCat = item.styles.map(function(s) { return s.name; }).join(',');
    } else {
      mainCat = cleanCalName(item.name);

    // 售價：每款式一個，逗號分隔

    // 收單時間：結單日轉 YYYY/M/D  23:55:00 PM

    // 商品描述
    var descText = '10-20\u5929\u5230\u8ca8\u901a\u77e5\n\u23f0' + (item.closeDate || '') + '\u7d50\u55ae\n\n' + (item.desc || '');

    var row = [
      '',           // 保留欄位
      item.customId || item.feedId || '',  // 自定義編號
      titleStr,     // 商品名稱
      mainCat,      // 主要分類
      '',           // 細項一
      '',           // 細項二

      '',           // 成本

      '\u5718\u8cfc\u5546\u54c1\ud83d\udc95', // 商品分類
      '',           // 僅供現貨
      '1',          // 禁止結單
      '',           // 成團人數
      closeTimeStr, // 收單時間

      '',           // 倉儲位置
      '',           // 預設供貨商
      descText,     // 商品描述

// ===== 匯出 ERP 匯入檔（給 branch_admin 商品建檔批次匯入用）=====
function exportForERP() {
  if (!batchList.length) { alert('清單是空的'); return; }

  // 先收集所有要查的 pid，批次查 ERP
  var allPids = [];
  batchList.forEach(function(item) {
    var hasStyles = item.styles && item.styles.length > 0;
    var mainIdMatch = item.name.match(/#([^#]+)#/);
    var mainPid = mainIdMatch ? mainIdMatch[1] : (item.customId || '');
    if (hasStyles) {
      item.styles.forEach(function(s) {
        var idMatch = s.name.match(/#([^#]+)#/);
        var pid = idMatch ? idMatch[1] : mainPid;
        if (pid) allPids.push(pid);
      });
    } else if (mainPid) {
      allPids.push(mainPid);
    }
  });

  batchCheckErp(allPids).then(function(erpMap) {
    doExportForERP(erpMap);
  }).catch(function(e) {
    console.log('batchCheckErp fail, fallback:', e);
    doExportForERP({});
  });
}

function doExportForERP(erpMap) {
  var tempMap = { '1': '冷凍', '2': '冷藏', '3': '常溫' };
  var dateStr = document.getElementById('targetDate').value; // YYYY-MM-DD
  var year = new Date(dateStr).getFullYear();

  // 表頭對齊 branch_admin bulkImportProducts 的 fieldAliases
  var headers = ['商品編號', '商品名稱', '售價', '商品分類', '開團日', '結單日'];
  var data = [headers];

  batchList.forEach(function(item) {
    var hasStyles = item.styles && item.styles.length > 0;

    // 結單日轉 YYYY-MM-DD
    var endDate = '';
    if (item.closeDate) {
      var parts = item.closeDate.split('/');
      if (parts.length === 2) {
        var cm = parseInt(parts[0], 10);
        var cd = parseInt(parts[1], 10);
        var orderMonth = parseInt(dateStr.slice(5, 7), 10);
        var y = year;
        if (cm < orderMonth) y++;
        endDate = y + '-' + String(cm).padStart(2, '0') + '-' + String(cd).padStart(2, '0');
      }
    }

    // 主商品名稱的編號（fallback 用）
    var mainIdMatch = item.name.match(/#([^#]+)#/);
    var mainPid = mainIdMatch ? mainIdMatch[1] : (item.customId || '');

    // 清理商品名稱：去掉 #編號#、emoji、(複製)、結單日資訊、前後垃圾符號
    function cleanName(str) {
      // 先從 ⏰ 或 💰 截斷（後面都是售價/結單日/描述，不要）
      var cut = str.replace(/#[^#]*#/g, '');
      var cutIdx = cut.search(/[⏰💰🔥]/);
      if (cutIdx > 0) cut = cut.substring(0, cutIdx);
      return cut
        .replace(/\(複製\)/g, '')
        .replace(/\d+\/\d+結單/g, '')
        .replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}\u{FE00}-\u{FE0F}\u{200D}\u{20E3}\u{2702}-\u{27B0}\u{1FA00}-\u{1FAFF}\u{2B50}\u{2B55}\u{231A}-\u{23F0}⬜⬛]/gu, '')
        .replace(/[-–—]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }
    // 清理款式名稱：去掉 (A)(B)(C)... 前綴、#編號#、(複製)
    function cleanStyleName(str) {
      return str.replace(/#[^#]*#/g, '').replace(/\(複製\)/g, '').replace(/^\s*\([A-Za-z]\)\s*/, '').replace(/^\s*[A-Za-z]\)\s*/, '').replace(/\s+/g, ' ').trim();
    }

    if (hasStyles) {
      // 有款式：每個款式拆成一行
      item.styles.forEach(function(s) {
        var idMatch = s.name.match(/#([^#]+)#/);
        var pid = idMatch ? idMatch[1] : mainPid;
        var styleName = cleanStyleName(s.name);
        var mainName = cleanName(item.name);
        var fullName = mainName + (styleName && styleName !== mainName ? ' ' + styleName : '');
        var temp = pid ? (tempMap[pid.charAt(0)] || '常溫') : '常溫';
        var price = s.price || item.price;
        // ERP 已有此編號 → 用 ERP 資料覆蓋 name/price/category
        var erpHit = erpMap[pid];
        if (erpHit) {
          fullName = erpHit.name || fullName;
          price = (erpHit.price != null ? erpHit.price : price);
          temp = erpHit.category || temp;
        }
        data.push([pid, fullName, price, temp, dateStr, endDate]);
      });
    } else {
      // 無款式：一行
      var pid = mainPid;
      var mainName = cleanName(item.name);
      var temp = pid ? (tempMap[pid.charAt(0)] || '常溫') : '常溫';
      var price = item.price;
      var erpHit = erpMap[pid];
      if (erpHit) {
        mainName = erpHit.name || mainName;
        price = (erpHit.price != null ? erpHit.price : price);
        temp = erpHit.category || temp;
      }
      data.push([pid, mainName, price, temp, dateStr, endDate]);
    }
  });

  var ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{ wch: 12 }, { wch: 35 }, { wch: 8 }, { wch: 8 }, { wch: 12 }, { wch: 12 }];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'ERP匯入');

  var today = dateStr.replace(/-/g, '');
  XLSX.writeFile(wb, 'ERP匯入_' + today + '.xls', { bookType: 'xls' });
}

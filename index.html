<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#f5f3ee;--surface:#fff;--border:#ddd9d0;--text:#2a2520;--text-muted:#7a7060;--accent:#c0392b;--accent-light:#fdf0ef;--green:#27ae60;--green-light:#edf7f1;--yellow:#e67e22;--yellow-light:#fef6ec;--blue:#2980b9;--tag-bg:#eceae4;--mono:'JetBrains Mono',monospace;--sans:'Noto Sans TC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
header{background:var(--text);color:white;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700}.logo span{color:#f0a500}
.header-status{font-size:12px;color:#aaa;font-family:var(--mono)}
.container{max-width:1100px;margin:0 auto;padding:24px 20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-green{background:var(--green);color:white}.btn-green:hover{background:#219a52}
.btn-yellow{background:var(--yellow);color:white}.btn-yellow:hover{background:#cf6d17}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--tag-bg)}
.btn-accent{background:var(--accent);color:white}.btn-accent:hover{background:#a93226}
.btn-blue{background:var(--blue);color:white}.btn-blue:hover{background:#2175a8}
.btn:disabled{opacity:.5;cursor:not-allowed}
.emoji-bar{display:none;flex-wrap:wrap;gap:2px;margin-bottom:6px}
.emoji-bar.show{display:flex}
.emoji-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 5px;font-size:16px;cursor:pointer;line-height:1.2}
.emoji-btn:hover{background:var(--tag-bg)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:var(--green-light);color:var(--green)}.badge-yellow{background:var(--yellow-light);color:var(--yellow)}
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 16px;flex:1;min-width:80px;text-align:center}
.stat-num{font-size:24px;font-weight:700;font-family:var(--mono);line-height:1.2}
.stat-num.green{color:var(--green)}.stat-num.yellow{color:var(--yellow)}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);transition:all .15s}
.tab.active{background:var(--text);color:white;border-color:var(--text)}
.result-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.result-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
.result-time{font-family:var(--mono);font-size:12px;color:var(--text-muted);min-width:90px;flex-shrink:0}
.result-name{flex:1;font-weight:500;font-size:14px}
.result-toggle{font-size:12px;color:var(--text-muted);transition:transform .2s}
.result-item.open .result-toggle{transform:rotate(180deg)}
.result-body{display:none;border-top:1px solid var(--border);padding:16px}
.result-item.open .result-body{display:block}
.match-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;margin-bottom:14px}
.match-key{font-size:12px;color:var(--text-muted);white-space:nowrap}.match-val{font-size:13px;font-weight:500}
.styles-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
.styles-table th{text-align:left;padding:6px 10px;background:var(--tag-bg);font-size:11px;font-weight:700;color:var(--text-muted);border-bottom:1px solid var(--border)}
.styles-table td{padding:6px 10px;border-bottom:1px solid var(--border)}.styles-table tr:last-child td{border-bottom:none}

.copy-btn-sm{padding:4px 10px;font-size:11px;border-radius:4px;background:white;border:1px solid var(--border);cursor:pointer;font-family:var(--sans);color:var(--text)}
.copy-btn-sm:hover{background:var(--border)}.copy-btn-sm.copied{color:var(--green);border-color:var(--green)}
.bot-block{background:#f0f7ff;border:1px solid #c8e0f8;border-radius:6px;padding:12px;margin-top:12px}

.new-marker{background:var(--yellow-light);border:1px solid #f0c080;border-radius:6px;padding:10px 14px;font-size:13px;color:var(--yellow);font-weight:500}

@keyframes spin{to{transform:rotate(360deg)}}
/* Modal */

.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.modal-styles-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}

/* Batch list */
.batch-section{margin-top:32px;border-top:2px solid var(--border);padding-top:24px}
.batch-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.batch-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:13px}
.batch-table th{text-align:left;padding:10px 12px;background:var(--tag-bg);font-size:11px;font-weight:700;color:var(--text-muted);border-bottom:1px solid var(--border)}

.batch-table tr:last-child td{border-bottom:none}
.batch-actions{display:flex;gap:8px;margin-top:16px}
.batch-empty{text-align:center;padding:30px;color:var(--text-muted);font-size:13px}
.new-tag{display:inline-block;background:var(--yellow-light);color:var(--yellow);font-size:11px;font-weight:700;padding:1px 6px;border-radius:3px}
</style>

<script>

// ── Bot items ──

// ── Text cleaning ──
function cleanText(text) {
  text = text.replace(/\(emoji\)/gi, '');
  text = text.replace(/\(\$\)/g, '$');
  text = text.replace(/\(\/\)/g, '/');
  text = text.replace(/\(!\)/g, '!');
  text = text.replace(/\(\?\)/g, '?');
  text = text.replace(/\(heart\)/gi, '');
  text = text.replace(/\(wink\)/gi, '');
  text = text.replace(/(\(\d+\))+/g, function(m) { return m.replace(/\((\d+)\)/g, '$1'); });
  text = text.replace(/\(([a-zA-Z])\)/g, '$1');
  var lines = text.split('\n');
  for (var i = 0; i < lines.length - 1; i++) {
    if (lines[i].trim() === '\u5230\u8ca8\u901a\u77e5' && lines[i+1].trim() && lines[i+1].indexOf('\u7d50\u55ae') === -1) {
      lines[i+1] = lines[i+1].trim() + '\u7d50\u55ae';
    }
  }
  text = lines.join('\n');
  text = text.replace(/\n{3,}/g, '\n\n');
  return text.trim();
}

// ── Text parsing (from 文案整理工具) ──
function expandParenChars(str) {
  return str.replace(/\(([^()]{1})\)/g, '$1');
}

function isLineFormat(text) {
  return /\(emoji\)/i.test(text) || /\(\$\)\(\d\)/.test(text);
}

function parseOne(text) {
  if (isLineFormat(text)) return parseLineFormat(text);
  return parseStandardFormat(text);
}

function parseLineFormat(text) {
  var lines = text.split('\n');
  var name = '', price = '', date = '';
  var bodyStartIndex = 0;
  for (var i = 0; i < lines.length; i++) {
    var t = lines[i].trim();
    if (t) { name = t; bodyStartIndex = i + 1; break; }
  }
  var headerLines = {};
  var subs = [];
  headerLines[0] = true;
  for (var h = 0; h < bodyStartIndex; h++) headerLines[h] = true;

  for (var i = bodyStartIndex; i < lines.length; i++) {
    var t = lines[i].trim();
    if (!t) continue;
    if (!price && /\(\$\)/.test(t)) {
      var expanded = expandParenChars(t);
      var m = expanded.match(/\$(\d+)/);
      if (m) { price = m[1]; headerLines[i] = true; continue; }
    }
    if (!date && /\(\d\)\(\/\)/.test(t)) {
      var expanded = expandParenChars(t);
      var m = expanded.match(/(\d{1,2}\/\d{1,2})/);
      if (m) { date = m[1]; headerLines[i] = true; continue; }
    }
    var subMatch = t.match(/^\(?([A-Za-z])\)\s*(.+)/);
    if (subMatch) {
      subs.push({ letter: subMatch[1].toUpperCase(), name: '(' + subMatch[1].toUpperCase() + ')' + subMatch[2].trim(), code: '' });
      headerLines[i] = true;
      continue;
    }
    if (/商品預購品/.test(t)) { headerLines[i] = true; continue; }
    if (/^(\(emoji\)\s*)+$/.test(t)) { headerLines[i] = true; continue; }
    if (price && date) break;
  }
  var contentStartIndex = lines.length;
  for (var i = bodyStartIndex; i < lines.length; i++) {
    if (headerLines[i]) continue;
    if (!lines[i].trim()) continue;
    contentStartIndex = i; break;
  }
  var desc = lines.slice(contentStartIndex).join('\n')
    .replace(/\(emoji\)/gi, '')
    .replace(/\((\d)\)\(\/\)((?:\(\d\))+)/g, function(_, m, rest) {
      var day = rest.replace(/\((\d)\)/g, '$1');
      return '\u23f0' + m + '/' + day + '\u7d50\u55ae';
    })
    .replace(/\(\$\)((?:\(\d\))+)/g, function(_, digits) {
      return '\ud83d\udcb0' + digits.replace(/\((\d)\)/g, '$1');
    })
    .replace(/\n{3,}/g, '\n\n').trim();
  return { name: name, price: price, date: date, code: '', desc: desc, subs: subs, temp: '3', seq: 0 };
}

function parseStandardFormat(text) {
  var lines = text.split('\n');
  var name = '', price = '', date = '';
  var subs = [];
  var separatorIndex = -1;
  for (var i = 0; i < lines.length; i++) {
    if (/^-{3,}\s*$/.test(lines[i].trim())) { separatorIndex = i; break; }
  }
  var infoLines = separatorIndex >= 0 ? lines.slice(0, separatorIndex) : lines;
  for (var i = 0; i < infoLines.length; i++) {
    var trimmed = infoLines[i].trim();
    if (!trimmed) continue;
    var nameMatch = trimmed.match(/^(?:\u54c1\u540d[\uff1a:]|\ud83c\udff7\ufe0f)\s*(.+)/);
    if (nameMatch) { name = nameMatch[1].trim(); continue; }
    var priceMatch = trimmed.match(/\ud83d\udcb0\s*(\d+)/);
    if (priceMatch) { price = priceMatch[1]; continue; }
    var dateMatch = trimmed.match(/\u23f0\s*(\d{1,2}\/\d{1,2})\s*\u7d50\u55ae/);
    if (dateMatch) { date = dateMatch[1]; continue; }
    var subMatch = trimmed.match(/^\(([A-Za-z])\)\s*(.+)/);
    if (subMatch) { subs.push({ letter: subMatch[1].toUpperCase(), name: '(' + subMatch[1].toUpperCase() + ')' + subMatch[2].trim(), code: '' }); continue; }
  }
  var desc = '';
  if (separatorIndex >= 0 && separatorIndex < lines.length - 1) {
    desc = lines.slice(separatorIndex + 1).join('\n').trim();
  }
  return { name: name, price: price, date: date, code: '', desc: desc, subs: subs, temp: '3', seq: 0 };
}

// ── Clean calendar name ──
function cleanCalName(name) {
  // 去掉 ⬜
  name = name.replace(/\u2b1c/g, '');
  // 去掉 💰數字 部分
  name = name.replace(/\ud83d\udcb0\s*\d+/g, '');
  // 去掉 ⏰M/D結單 部分
  name = name.replace(/\u23f0\s*\d{1,2}\/\d{1,2}\s*\u7d50\u55ae/g, '');
  // 去掉 #...# 部分
  name = name.replace(/#[^#]*#/g, '');
  return name.replace(/\s+/g, ' ').trim();
}

// ── Parse price from name or text ──
function parsePriceFromText(text) {
  if (!text) return '';
  // 💰數字
  var m = text.match(/\ud83d\udcb0\s*(\d+)/);
  if (m) return m[1];
  // ($)(數字) format (LINE)
  if (/\(\$\)/.test(text)) {
    var expanded = expandParenChars(text);
    var m2 = expanded.match(/\$(\d+)/);
    if (m2) return m2[1];
  }
  // $數字 or ＄數字
  var m3 = text.match(/[\$\uff04]\s*(\d+)/);
  if (m3) return m3[1];
  return '';
}

// ── Parse close date from name or text ──
function parseCloseDateFromText(text) {
  if (!text) return '';
  // ⏰M/D結單
  var m = text.match(/\u23f0\s*(\d{1,2}\/\d{1,2})\s*\u7d50\u55ae/);
  if (m) return m[1];
  // (數字)(/)(數字) LINE format
  if (/\(\d\)\(\/\)/.test(text)) {
    var expanded = expandParenChars(text);
    var m2 = expanded.match(/(\d{1,2}\/\d{1,2})/);
    if (m2) return m2[1];
  }
  // 到貨通知 next line
  var lines = text.split('\n');
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].trim() === '\u5230\u8ca8\u901a\u77e5' && i + 1 < lines.length) {
      var dm = lines[i+1].trim().match(/(\d{1,2}\/\d{1,2})/);
      if (dm) return dm[1];
    }
  }
  // M/D結單
  var cm = text.match(/(\d{1,2}\/\d{1,2})\u7d50\u55ae/);
  if (cm) return cm[1];
  return '';
}

// ── Auto-detect temp code from name ──
function detectTempCode(name) {
  if (/\u51b7\u51cd/.test(name)) return '1';
  if (/\u51b7\u85cf/.test(name)) return '2';
  return '3';
}

// ── findBotItem ──
function findBotItem(calName) {
  if (!botItems.length) return null;
  var clean = calName.replace(/[^\u4e00-\u9fffa-zA-Z0-9]/g, '').toLowerCase();
  if (!clean || clean.length < 2) return null;
  var best = null, bestScore = 0;
  for (var i = 0; i < botItems.length; i++) {
    var item = botItems[i];
    var bn = (item.productName || '').replace(/[^\u4e00-\u9fffa-zA-Z0-9]/g, '').toLowerCase();
    if (!bn) continue;
    var score = 0;
    if (bn === clean) score = 1;
    else if (bn.indexOf(clean) !== -1 || clean.indexOf(bn) !== -1) score = 0.9;
    else if (clean.length >= 3 && bn.indexOf(clean.slice(0, 3)) !== -1) score = 0.7;
    else if (bn.length >= 3 && clean.indexOf(bn.slice(0, 3)) !== -1) score = 0.7;
    if (score > bestScore) { bestScore = score; best = item; }
  }
  return bestScore >= 0.7 ? best : null;
}

// ── Extract search keyword from calendar name ──
function extractSearchKey(name) {
  // 去掉括號格式 ($)(emoji)(數字)(/) 等
  var s = name.replace(/\([^)]*\)/g, '');
  // 去掉 #...#、💰數字、⏰日期結單、⬜
  s = s.replace(/#[^#]*#/g, '').replace(/\ud83d\udcb0\s*\d+/g, '').replace(/\u23f0[^結]*\u7d50\u55ae/g, '').replace(/\u2b1c/g, '');
  // 去掉 ±%*（）
  s = s.replace(/[±%*（）\[\]]/g, '');
  // 提取中文字
  var cjk = s.replace(/[^\u4e00-\u9fff]/g, '');
  // 如果有）或）後面的內容，取後面的（去掉品牌前綴如「禾田）」）
  var brandCut = name.indexOf('\uff09');
  if (brandCut === -1) brandCut = name.indexOf(')');
  if (brandCut !== -1) {
    var after = name.slice(brandCut + 1).replace(/[^\u4e00-\u9fff]/g, '');
    if (after.length >= 2) cjk = after;
  }
  return cjk.slice(0, 5);
}

// ── Supabase search ──
async function searchSupabase(keyword) {
  var query = extractSearchKey(keyword);
  if (!query || query.length < 2) {
    // fallback: 取任意中文
    query = keyword.replace(/[^\u4e00-\u9fff]/g, '').slice(0, 4);
  }
  if (!query) return null;
  var url = SUPABASE_URL + '/rest/v1/gb_lele_products?title=ilike.*' + encodeURIComponent(query) + '*&select=id,title,price_min,price_max,img_url,feed_id,styles,description&limit=10';
  var res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } });
  var rows = await res.json();
  if (!rows || !rows.length) return null;
  var best = null, bestScore = 0;
  for (var i = 0; i < rows.length; i++) {
    var s = similarity(keyword, rows[i].title);
    if (s > bestScore) { bestScore = s; best = rows[i]; }
  }
  if (bestScore < 0.25) return null;
  return {
    id: best.id, title: best.title, priceMin: best.price_min, priceMax: best.price_max,
    imgUrl: best.img_url, feedId: best.feed_id,
    styles: (best.styles || []).map(function(s) { return { name: s.name, price: s.price, cost: s.cost }; }),
    description: best.description || '',
    score: bestScore
  };
}

// ── Calendar ──
function fetchCalendar() {
  var dateStr = document.getElementById('targetDate').value;
  if (!dateStr) { setLog('\u26a0 \u8acb\u9078\u64c7\u65e5\u671f'); return; }
  var btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> \u8b80\u53d6\u4e2d\u2026';
  setLog('\u9023\u7dda\u4e2d\u2026');
  var dayStart = new Date(dateStr + 'T00:00:00+08:00').toISOString();
  var dayEnd = new Date(dateStr + 'T23:59:59+08:00').toISOString();
  var url = 'https://www.googleapis.com/calendar/v3/calendars/' + encodeURIComponent(GCAL_CAL_ID) + '/events'
    + '?key=' + GCAL_API_KEY + '&timeMin=' + encodeURIComponent(dayStart) + '&timeMax=' + encodeURIComponent(dayEnd)
    + '&singleEvents=true&orderBy=startTime&maxResults=100';
  fetch(url).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(r) {
      if (!r.ok) throw new Error((r.data.error && r.data.error.message) || 'HTTP error');
      calendarItems = (r.data.items || []).map(function(ev) {
        var start = ev.start && ev.start.dateTime ? ev.start.dateTime : '';
        var t = '';
        if (start) { try { t = new Date(start).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Taipei' }); } catch(e) {} }
        return { name: ev.summary || '', time: t };
      }).filter(function(ev) { return ev.name; });
      setLog('\u2713 \u8b80\u53d6\u5230 ' + calendarItems.length + ' \u500b\u4e8b\u4ef6');
      if (!calendarItems.length) showEmpty(); else runMatch();
    })
    .catch(function(err) { setLog('\u2717 ' + err.message); })
    .finally(function() { btn.disabled = false; btn.innerHTML = '\ud83d\udcc5 \u8b80\u53d6\u4eca\u65e5\u5546\u54c1'; });
}

// ── Matching ──
function tokenize(str) {
  // 去掉括號格式 ($)(emoji)(數字)(/) 等
  var s = str.replace(/\([^)]*\)/g, '');
  // 去掉 #...#、$數字、日期結單、emoji
  s = s.replace(/#[^#]*#/g, '').replace(/[\$\uff04][\d,]+/g, '').replace(/\d+\/\d+\u7d50\u55ae/g, '');
  // 去掉 ±%*（）⬜💰⏰ 等符號
  s = s.replace(/[±%*（）\u2b1c\ud83d\udcb0\u23f0]/g, '');
  // 去掉數字+單位（g ml 入 片 包 顆 條 罐 瓶 盒 袋 組 份 支 杯 碗 塊 個 粒 串 尾 隻 斤 公斤 kg）
  s = s.replace(/\d+\s*(g|ml|kg|入|片|包|顆|條|罐|瓶|盒|袋|組|份|支|杯|碗|塊|個|粒|串|尾|隻|斤|公斤)/gi, '');
  // 去掉剩餘數字
  s = s.replace(/\d+/g, '');
  // 只留中文字
  return s.replace(/[^\u4e00-\u9fff\u3400-\u4dbf]/g, '').trim();
}
function similarity(a, b) {
  var ta = tokenize(a), tb = tokenize(b);
  if (!ta || !tb) return 0;
  if (tb.indexOf(ta) !== -1) return 0.95;
  if (ta.indexOf(tb) !== -1) return 0.90;
  var shorter = ta.length < tb.length ? ta : tb;
  var longer = ta.length < tb.length ? tb : ta;
  var maxLen = 0;
  for (var i = 0; i < shorter.length; i++)
    for (var j = i + 2; j <= shorter.length; j++) {
      var sub = shorter.slice(i, j);
      if (longer.indexOf(sub) !== -1 && sub.length > maxLen) maxLen = sub.length;
    }
  var setA = new Set(ta), setB = new Set(tb);
  var common = 0; setA.forEach(function(c) { if (setB.has(c)) common++; });
  return Math.max(maxLen / shorter.length * 0.8, (2 * common) / (setA.size + setB.size) * 0.5);
}

async function runMatch() {
  setLog('\u6bd4\u5c0d\u5546\u54c1\u5eab\u4e2d\u2026 0 / ' + calendarItems.length);
  matchResults = [];
  for (var i = 0; i < calendarItems.length; i++) {
    var item = calendarItems[i];
    var result = await searchSupabase(item.name);
    matchResults.push({ calItem: item, match: result || null, score: result ? result.score : 0, isNew: !result });
    setLog('\u6bd4\u5c0d\u5546\u54c1\u5eab\u4e2d\u2026 ' + (i+1) + ' / ' + calendarItems.length);
  }
  setLog('\u2713 \u6bd4\u5c0d\u5b8c\u6210');
  renderResults();
}

function renderResults() {
  document.getElementById('resultsArea').style.display = '';
  document.getElementById('emptyState').style.display = 'none';
  var matched = matchResults.filter(function(r) { return !r.isNew; }).length;

    '<div class="stat-box"><div class="stat-num">' + matchResults.length + '</div><div class="stat-label">\u4eca\u65e5\u5546\u54c1</div></div>' +
    '<div class="stat-box"><div class="stat-num green">' + matched + '</div><div class="stat-label">\u2705 \u5df2\u6bd4\u5c0d</div></div>' +
    '<div class="stat-box"><div class="stat-num yellow">' + newItems + '</div><div class="stat-label">\ud83c\udd95 \u65b0\u54c1</div></div>' +
    '<div class="stat-box"><div class="stat-num">' + botItems.length + '</div><div class="stat-label">\ud83d\udcf1 Bot \u6587\u6848</div></div>';

}

function filterResults(type, el) {
  currentFilter = type;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  renderFiltered();
}

function renderFiltered() {
  var list = document.getElementById('resultsList');
  var items = matchResults;
  if (currentFilter === 'matched') items = matchResults.filter(function(r) { return !r.isNew; });
  if (currentFilter === 'new') items = matchResults.filter(function(r) { return r.isNew; });
  if (!items.length) { list.innerHTML = '<div class="empty-state"><div class="icon">\ud83d\udd0d</div><p>\u6b64\u5206\u985e\u6c92\u6709\u9805\u76ee</p></div>'; return; }
  botTextMap = {};
  list.innerHTML = items.map(function(r, i) { return renderItem(r, i); }).join('');
  items.forEach(function(r, i) {
    var btn = document.getElementById('bot-copy-' + i);
    if (btn) {
      btn.addEventListener('click', function() {
        var ta = document.getElementById('bot-ta-' + i);
        var text = ta ? ta.value : (botTextMap[i] || '');
        navigator.clipboard.writeText(text).then(function() {
          btn.textContent = '\u5df2\u8907\u88fd \u2713'; btn.classList.add('copied');
          setTimeout(function() { btn.textContent = '\u8907\u88fd\u6587\u6848'; btn.classList.remove('copied'); }, 2000);
        });
      });
    }
    var hbtn = document.getElementById('hist-copy-' + i);
    if (hbtn) {
      hbtn.addEventListener('click', function() {
        var hta = document.getElementById('hist-ta-' + i);
        if (!hta) return;
        navigator.clipboard.writeText(hta.value).then(function() {
          hbtn.textContent = '\u5df2\u8907\u88fd \u2713'; hbtn.classList.add('copied');
          setTimeout(function() { hbtn.textContent = '\u8907\u88fd'; hbtn.classList.remove('copied'); }, 2000);
        });
      });
    }
  });
}

function renderItem(r, idx) {
  var badge = r.isNew

    : '<span class="badge badge-green">\u2705 \u5df2\u6bd4\u5c0d ' + Math.round(r.score * 100) + '%</span>';

  return '<div class="result-item" id="item-' + idx + '">' +
    '<div class="result-header" onclick="toggleItem(' + idx + ')">' +
    '<div class="result-time">' + (r.calItem.time || '\u5168\u5929') + '</div>' +
    '<div class="result-name">' + esc(r.calItem.name) + '</div>' +
    badge + '<div class="result-toggle">\u25bc</div></div>' +
    '<div class="result-body">' + body + '</div></div>';
}

function renderMatchBody(r, idx) {
  var calItem = r.calItem, match = r.match;
  var img = match.imgUrl ? '<img class="product-img" src="' + esc(match.imgUrl) + '" onerror="this.style.display=\'none\'">' : '';
  var stylesRows = match.styles.map(function(s) {
    return '<tr><td>' + esc(s.name) + '</td><td>' + (s.price ? '$' + s.price : '\u2014') + '</td><td>' + (s.cost ? '$' + s.cost : '\u2014') + '</td></tr>';
  }).join('');
  var stylesHtml = match.styles.length ? '<div class="section-label">\u6b3e\u5f0f\u660e\u7d30</div><table class="styles-table"><tr><th>\u6b3e\u5f0f</th><th>\u552e\u50f9</th><th>\u6210\u672c</th></tr>' + stylesRows + '</table>' : '';
  var copyLines = ['\u3010' + calItem.name + '\u3011'];
  if (match.styles.length) match.styles.forEach(function(s) { copyLines.push(s.name + '\u3000$' + s.price); });
  else if (match.priceMin) copyLines.push('\u552e\u50f9\uff1a$' + match.priceMin);
  var copyText = copyLines.join('\n');
  var botHtml = renderBotBlock(calItem, idx);
  var histDescHtml = '';
  if (match.description) {
    histDescHtml = '<div class="bot-block" style="background:#f0f0ff;border-color:#c0c0e8;">' +
      '<div class="bot-block-title" style="color:#6c5ce7;">\ud83d\udccb \u6b77\u53f2\u6587\u6848</div>' +
      '<div style="display:flex;gap:6px;margin-bottom:8px;">' +
      '<button class="copy-btn-sm" id="hist-copy-' + idx + '">\u8907\u88fd</button>' +
      '</div>' +
      '<textarea id="hist-ta-' + idx + '" style="width:100%;min-height:120px;font-family:var(--sans);font-size:13px;line-height:1.7;border:1px solid #c0c0e8;border-radius:4px;padding:8px;background:white;resize:vertical;">' +
      esc(match.description) + '</textarea></div>';
  }
  var addBtn = '<div style="margin-top:12px;"><button class="btn btn-green" onclick="openModal(' + idx + ',false)" style="font-size:13px;">\u2705 \u6574\u7406\u4e0a\u67b6</button></div>';
  return img +

    '<div class="match-key">FeedID</div><div class="match-val" style="font-family:var(--mono);font-size:12px;">' + esc(match.feedId || '\u2014') + '</div></div>' +
    stylesHtml +
    '<div class="copy-block"><button class="copy-btn-sm" id="lele-copy-' + idx + '">\u8907\u88fd</button><pre id="lele-pre-' + idx + '">' + esc(copyText) + '</pre></div>' +
    histDescHtml + botHtml + addBtn;
}

function renderNewBody(r, idx) {
  var botHtml = renderBotBlock(r.calItem, idx);
  var addBtn = '<div style="margin-top:12px;"><button class="btn btn-yellow" onclick="openModal(' + idx + ',true)" style="font-size:13px;">\ud83c\udd95 \u6574\u7406\u4e0a\u67b6</button></div>';
  return '<div class="new-marker">\ud83c\udd95 \u6b64\u5546\u54c1\u5728\u6a02\u6a02\u8cc7\u6599\u5eab\u4e2d\u627e\u4e0d\u5230\u5c0d\u61c9\u5546\u54c1\uff0c\u53ef\u80fd\u662f\u65b0\u54c1\u6216\u540d\u7a31\u5dee\u7570\u592a\u5927\u3002</div>' + botHtml + addBtn;
}

function renderBotBlock(calItem, idx) {
  var botItem = findBotItem(calItem.name);
  if (!botItem) return '';
  var cleaned = cleanText(botItem.text);
  botTextMap[idx] = cleaned;
  var emojiButtons = EMOJI_LIST.map(function(e) {
    return '<button class="emoji-btn" onclick="insertEmoji(' + idx + ',\'' + e + '\')">' + e + '</button>';
  }).join('');
  return '<div class="bot-block">' +
    '<div class="bot-block-title">\ud83d\udcf1 \u4f9b\u61c9\u5546\u6587\u6848</div>' +
    '<div style="display:flex;gap:6px;margin-bottom:8px;">' +
    '<button class="copy-btn-sm" id="bot-copy-' + idx + '">\u8907\u88fd\u6587\u6848</button>' +
    '<button class="copy-btn-sm" onclick="toggleEdit(' + idx + ')">\u270f\ufe0f \u7de8\u8f2f</button>' +
    '</div>' +
    '<div class="emoji-bar" id="emoji-bar-' + idx + '">' + emojiButtons + '</div>' +
    '<textarea id="bot-ta-' + idx + '" readonly style="width:100%;min-height:180px;font-family:var(--sans);font-size:13px;line-height:1.7;border:1px solid #c8e0f8;border-radius:4px;padding:8px;background:white;resize:vertical;">' +
    esc(cleaned) + '</textarea></div>';
}

function toggleEdit(idx) {
  var ta = document.getElementById('bot-ta-' + idx);
  var bar = document.getElementById('emoji-bar-' + idx);
  if (!ta) return;
  if (ta.readOnly) {
    ta.removeAttribute('readonly');
    ta.style.background = '#fffbe6';
    if (bar) bar.classList.add('show');
    ta.focus();
  } else {
    ta.readOnly = true;
    ta.style.background = 'white';
    if (bar) bar.classList.remove('show');
    botTextMap[idx] = ta.value;
  }
}

function insertEmoji(idx, emoji) {
  var ta = document.getElementById('bot-ta-' + idx);
  if (!ta || ta.readOnly) return;
  var start = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.slice(0, start) + emoji + ta.value.slice(end);
  var pos = start + emoji.length;
  ta.selectionStart = ta.selectionEnd = pos;
  ta.focus();
  botTextMap[idx] = ta.value;
}

function toggleItem(idx) { document.getElementById('item-' + idx).classList.toggle('open'); }

// lele copy delegation

});

function showEmpty() { document.getElementById('resultsArea').style.display = 'none'; document.getElementById('emptyState').style.display = ''; }
function setLog(msg) { document.getElementById('log').textContent = msg; }
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════
//  Modal – 整理上架
// ══════════════════════════════════════
function openModal(idx, isNew) {
  var items = getFilteredItems();
  var r = items[idx];
  if (!r) return;
  var calItem = r.calItem;
  var match = r.match;
  var botItem = findBotItem(calItem.name);
  var rawBotText = botItem ? botItem.text : '';
  // 如果 textarea 有被編輯過，優先用編輯後的
  var ta = document.getElementById('bot-ta-' + idx);
  var botText = ta ? ta.value : (rawBotText ? cleanText(rawBotText) : '');

  modalCtx = { idx: idx, isNew: isNew, match: match, calItem: calItem };

  document.getElementById('modalTitle').textContent = isNew ? '\ud83c\udd95 \u65b0\u54c1\u4e0a\u67b6' : '\u2705 \u6574\u7406\u4e0a\u67b6';

  // 用 parseOne 解析原始 bot 文案
  var parsed = rawBotText ? parseOne(rawBotText) : null;

  // 1. 商品名稱：優先文案解析 > 日曆名稱清理
  var cleanedName = cleanCalName(calItem.name);
  document.getElementById('mName').value = (parsed && parsed.name) ? parsed.name : cleanedName;

  // 2. 售價：優先文案解析 > match > 日曆名稱解析
  var price = '';
  if (parsed && parsed.price) price = parsed.price;
  if (!price && match && match.priceMin) price = match.priceMin;
  if (!price) price = parsePriceFromText(calItem.name);
  document.getElementById('mPrice').value = price;

  // 3. 結單日：優先文案解析 > 日曆名稱解析
  var closeDate = '';
  if (parsed && parsed.date) closeDate = parsed.date;
  if (!closeDate) closeDate = parseCloseDateFromText(calItem.name);
  document.getElementById('mCloseDate').value = closeDate;

  // 4. 款式：優先文案解析 > match
  var tbody = document.getElementById('mStylesBody');
  tbody.innerHTML = '';
  if (parsed && parsed.subs && parsed.subs.length) {
    parsed.subs.forEach(function(s) { addModalStyleRow(s.name, ''); });
  } else if (match && match.styles && match.styles.length) {
    match.styles.forEach(function(s) { addModalStyleRow(s.name, s.price); });
  }

  // 5. 商品描述：優先歷史文案 > parsed.desc > 清理後文案
  var histTa = document.getElementById('hist-ta-' + idx);
  var descText = histTa ? histTa.value : '';
  if (!descText && parsed) descText = parsed.desc || '';
  if (!descText) descText = botText;
  document.getElementById('mDesc').value = descText;

  document.getElementById('modalOverlay').classList.add('show');
}

function reparseDesc() {
  var descEl = document.getElementById('mDesc');
  var text = descEl.value;
  if (!text) return;
  var parsed = parseOne(text);
  if (parsed.price) document.getElementById('mPrice').value = parsed.price;
  if (parsed.date) document.getElementById('mCloseDate').value = parsed.date;
  if (parsed.subs && parsed.subs.length) {
    var tbody = document.getElementById('mStylesBody');
    tbody.innerHTML = '';
    parsed.subs.forEach(function(s) { addModalStyleRow(s.name, ''); });
  }
  if (parsed.desc) descEl.value = parsed.desc;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  modalCtx = null;
}

function addModalStyleRow(name, price) {
  var tbody = document.getElementById('mStylesBody');
  var tr = document.createElement('tr');
  tr.innerHTML = '<td><input type="text" value="' + esc(name || '') + '" placeholder="\u6b3e\u5f0f\u540d\u7a31"></td>' +
    '<td><input type="number" value="' + esc(String(price || '')) + '" placeholder="\u552e\u50f9" style="width:90px;"></td>' +
    '<td><button class="del-style-btn" onclick="this.closest(\'tr\').remove()">\u2716</button></td>';
  tbody.appendChild(tr);
}

function getFilteredItems() {
  if (currentFilter === 'matched') return matchResults.filter(function(r) { return !r.isNew; });
  if (currentFilter === 'new') return matchResults.filter(function(r) { return r.isNew; });
  return matchResults;
}

function confirmModal() {
  if (!modalCtx) return;
  var name = document.getElementById('mName').value.trim();
  var price = document.getElementById('mPrice').value.trim();
  var closeDate = document.getElementById('mCloseDate').value.trim();
  var desc = document.getElementById('mDesc').value;
  var isNew = modalCtx.isNew;
  var match = modalCtx.match;

  if (!name) { alert('\u8acb\u8f38\u5165\u5546\u54c1\u540d\u7a31'); return; }
  if (!price) { alert('\u8acb\u8f38\u5165\u552e\u50f9'); return; }

  // collect styles from table
  var styles = [];
  var rows = document.getElementById('mStylesBody').querySelectorAll('tr');
  rows.forEach(function(tr) {
    var inputs = tr.querySelectorAll('input');
    var sn = inputs[0].value.trim();
    var sp = inputs[1].value.trim();
    if (sn) styles.push({ name: sn, price: sp || price });
  });

  // generate id for new items
  var feedId = '';
  var customId = '';
  if (!isNew && match && match.feedId) {
    feedId = match.feedId;
    customId = match.feedId;
  } else {
    // 新品編號：溫度碼 + YYMMDD + 兩位流水號
    var tempCode = detectTempCode(name);
    var dateStr = document.getElementById('targetDate').value; // YYYY-MM-DD
    var yy = dateStr.slice(2,4), mm = dateStr.slice(5,7), dd = dateStr.slice(8,10);
    var seq = String(newItemSeq).padStart(2, '0');
    newItemSeq++;
    customId = tempCode + yy + mm + dd + seq;
    feedId = customId;
  }

  batchList.push({
    name: name,
    price: price,
    closeDate: closeDate,
    styles: styles,
    desc: desc,
    isNew: isNew,
    feedId: feedId,
    customId: customId,
    match: match
  });

  closeModal();
  renderBatch();
}

// ══════════════════════════════════════
//  Batch list
// ══════════════════════════════════════
function renderBatch() {
  document.getElementById('batchCount').textContent = batchList.length;
  var body = document.getElementById('batchBody');
  var actions = document.getElementById('batchActions');
  if (!batchList.length) {
    body.innerHTML = '<div class="batch-empty">\u5c1a\u672a\u52a0\u5165\u4efb\u4f55\u5546\u54c1\uff0c\u8acb\u5f9e\u4e0a\u65b9\u9ede\u64ca\u300c\u6574\u7406\u4e0a\u67b6\u300d</div>';
    actions.style.display = 'none';
    return;
  }
  actions.style.display = '';
  var html = '<table class="batch-table"><tr><th>#</th><th>\u5546\u54c1\u540d\u7a31</th><th>\u552e\u50f9</th><th>\u7d50\u55ae\u65e5</th><th>\u7de8\u865f</th><th></th></tr>';
  batchList.forEach(function(item, i) {
    html += '<tr><td>' + (i+1) + '</td>' +
      '<td>' + esc(item.name) + (item.isNew ? ' <span class="new-tag">\u65b0\u54c1</span>' : '') + '</td>' +
      '<td>$' + esc(item.price) + '</td>' +
      '<td>' + esc(item.closeDate || '\u2014') + '</td>' +
      '<td style="font-family:var(--mono);font-size:12px;">' + esc(item.customId) + '</td>' +
      '<td><button class="copy-btn-sm" onclick="removeBatch(' + i + ')" style="color:var(--accent);">\u2716</button></td></tr>';
  });
  html += '</table>';
  body.innerHTML = html;
}

function removeBatch(i) {
  batchList.splice(i, 1);
  renderBatch();
}

function clearBatch() {
  if (!confirm('\u78ba\u5b9a\u8981\u6e05\u9664\u5168\u90e8 ' + batchList.length + ' \u7b46\uff1f')) return;
  batchList = [];
  newItemSeq = 1;
  renderBatch();
}

// ══════════════════════════════════════
//  Export XLS
// ══════════════════════════════════════
function exportXLS() {
  if (!batchList.length) return;

  var headers = [
    '\u4fdd\u7559\u6b04\u4f4d',
    '\u81ea\u5b9a\u7fa9\u7de8\u865f',
    '\u5546\u54c1\u540d\u7a31',
    '\u4e3b\u8981\u5206\u985e\n(\u6b3e\u5f0f\u540d\u7a31\uff0c\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u7d30\u9805\u4e00\n(\u6b3e\u5f0f\u4e8c\u540d\u7a31\uff0c\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u7d30\u9805\u4e8c\n(\u6b3e\u5f0f\u4e09\u540d\u7a31\uff0c\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u552e\u50f9\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    'VIP\u50f9\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u6210\u672c\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u5eab\u5b58\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u50c5\u9650VIP\n(1=\u662f, \u7a7a\u767d=\u5426)',
    '\u4e0a\u67b6\u500b\u4eba\u8ce3\u5834\n(1=\u662f, \u7a7a\u767d=\u5426)',
    '\u5546\u54c1\u5206\u985e\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u50c5\u4f9b\u73fe\u8ca8\n(1=\u662f, \u7a7a\u767d=\u5426)',
    '\u7981\u6b62\u7d50\u55ae\n(1=\u662f, \u7a7a\u767d=\u5426)',
    '\u6210\u5718\u4eba\u6578',
    '\u6536\u55ae\u6642\u9593\n(yyyy/M/d  hh:mm:ss AM/PM)',
    '\u81ea\u5b9a\u7fa9\u6a19\u7c64\n(\u4ee5\u534a\u5f62\u9017\u865f\u5206\u9694)',
    '\u5009\u5132\u4f4d\u7f6e',
    '\u9810\u8a2d\u4f9b\u8ca8\u5546',
    '\u5546\u54c1\u63cf\u8ff0',
    '\u5546\u54c1\u5099\u8a3b',
    '\u516c\u958b\u5099\u8a3b',
    '\u6a94\u6848\u7248\u672c'
  ];

  var data = [headers];
  var dateStr = document.getElementById('targetDate').value;

  batchList.forEach(function(item) {
    var id = item.customId;
    var hasStyles = item.styles && item.styles.length > 0;

    // 商品名稱格式
    var titleStr = '\u2b1c' + item.name + '\ud83d\udcb0' + item.price + '\u23f0' + (item.closeDate || '') + '\u7d50\u55ae#' + id + '#';

    // 主要分類
    var mainCat = '';
    if (hasStyles) {
      mainCat = item.styles.map(function(s, si) {
        var styleId = id + si;
        return s.name + '#' + styleId + '#';
      }).join(',');
    } else {
      mainCat = item.name;
    }

    // 售價
    var priceStr = '';
    if (hasStyles) {
      priceStr = item.styles.map(function(s) { return s.price || item.price; }).join(',');
    } else {
      priceStr = item.price;
    }

    // 收單時間：結單日轉 YYYY/M/D  23:55:00 PM
    var closeTimeStr = '';
    if (item.closeDate) {
      var parts = item.closeDate.split('/');
      if (parts.length === 2) {
        var year = new Date(dateStr).getFullYear();
        var cm = parseInt(parts[0], 10);
        var cd = parseInt(parts[1], 10);
        // 如果結單月份小於開團月份，跨年
        var orderMonth = parseInt(dateStr.slice(5,7), 10);
        if (cm < orderMonth) year++;
        closeTimeStr = year + '/' + cm + '/' + cd + '  23:55:00 PM';
      }
    }

    // 商品描述
    var descText = '10-20\u5929\u5230\u8ca8\u901a\u77e5\n\u23f0' + (item.closeDate || '') + '\u7d50\u55ae\n\n' + (item.desc || '');

    var row = [
      '',           // 保留欄位
      id,           // 自定義編號
      titleStr,     // 商品名稱
      mainCat,      // 主要分類
      '',           // 細項一
      '',           // 細項二
      priceStr,     // 售價
      '',           // VIP價
      '',           // 成本
      '',           // 庫存
      '',           // 僅限VIP
      '1',          // 上架個人賣場
      '\u5718\u8cfc\u5546\u54c1\ud83d\udc95', // 商品分類
      '',           // 僅供現貨
      '1',          // 禁止結單
      '',           // 成團人數
      closeTimeStr, // 收單時間
      '',           // 自定義標籤
      '',           // 倉儲位置
      '',           // 預設供貨商
      descText,     // 商品描述
      '',           // 商品備註
      '',           // 公開備註
      '1'           // 檔案版本
    ];
    data.push(row);
  });

  var ws = XLSX.utils.aoa_to_sheet(data);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '\u5546\u54c1\u532f\u5165');

  var today = dateStr.replace(/-/g, '');
  XLSX.writeFile(wb, '\u6a02\u6a02\u4e0a\u67b6_' + today + '.xls', { bookType: 'xls' });
}
</script>
